<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚴</text></svg>">
  <title>Triathlon Training HUD</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      --hud-bg: #080a0f;
      --hud-panel: #12161d;
      --hud-panel-soft: #0e1218;
      --hud-track: #292f38;
      --hud-cyan: #718fa9;
      --hud-green: #789486;
      --hud-muted: #8994a3;
      --hud-due-bg: #21171b;
      --hud-due-border: #97606c;
      --hud-due: #c47b89;
      --hud-white: #e2e8f0;
      --hud-water: #718fae;
      --hud-fuel: #bf8952;
      --hud-stretch: #8d7ba8;
      --hud-aero: #6f879e;
      --hud-upright: #9b8878;
      --hud-mono: "Cascadia Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; margin: 0; }
    html, body { overflow: hidden; background: var(--hud-bg); }
    button, input { font: inherit; }
    button { touch-action: manipulation; }
    button:focus-visible, input:focus-visible, [tabindex="0"]:focus-visible { outline: 3px solid var(--hud-white); outline-offset: 2px; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .screen {
      position: relative; width: 100%; height: 100%; min-height: 300px; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 28px clamp(12px, 4vmin, 20px) 34px; text-align: center; user-select: none;
      cursor: pointer; transition: background-color 140ms ease, color 140ms ease;
    }
    .setup, .review { overflow-y: auto; justify-content: flex-start; cursor: default; background: var(--hud-bg); color: #fff; }
    .setup { overflow: hidden; padding: 12px clamp(10px, 3vw, 18px) 0; background-image: linear-gradient(180deg, rgba(5,10,16,.72), rgba(5,10,16,.92)), url("%BASE_URL%assets/immersive-training-room.webp"); background-position: center; background-size: cover; }
    .setup-header { width: min(96vw, 1180px); margin-top: auto; padding: 7px 12px 8px; border: 1px solid rgba(125,160,188,.34); border-bottom: 0; border-radius: 13px 13px 0 0; background: rgba(5,14,23,.76); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .brand { margin: 0; color: #edf4fa; font-size: clamp(1.25rem, 4.5vmin, 1.55rem); line-height: 1; letter-spacing: .04em; font-weight: 1000; }
    .subtitle { margin: 4px 0 0; color: #8298aa; font-size: .58rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    .setup-shell { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); flex: 0 1 auto; min-height: 0; align-content: start; align-items: start; gap: 8px; width: min(96vw, 1180px); overflow-y: auto; padding: 8px; border: 1px solid rgba(125,160,188,.34); border-top: 0; background: rgba(5,14,23,.68); scrollbar-color: #5b6675 transparent; scrollbar-gutter: stable; scrollbar-width: thin; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .setup-shell > .setup-section:first-child, .setup-shell > .setup-options { grid-column: 1 / -1; }
    .setup-shell::-webkit-scrollbar { width: 8px; }
    .setup-shell::-webkit-scrollbar-track { background: transparent; }
    .setup-shell::-webkit-scrollbar-thumb { border: 2px solid transparent; border-radius: 999px; background: #5b6675; background-clip: padding-box; }
    .setup-section { width: 100%; margin: 0; padding: 9px 10px; border: 1px solid rgba(104,137,165,.4); border-radius: 10px; background: linear-gradient(180deg, rgba(41,57,72,.76), rgba(22,33,44,.82)); box-shadow: inset 0 1px rgba(255,255,255,.04); }
    .setup-span { grid-column: auto; }
    .section-title { display: flex; align-items: center; gap: 6px; margin: 0 0 7px; color: #b5c8d8; text-align: left; font-size: .65rem; font-weight: 1000; letter-spacing: .09em; text-transform: uppercase; }
    .section-icon { color: #7f9eb4; font-size: .82rem; line-height: 1; }
    .section-optional { color: #7990a8; font-weight: 800; }
    .fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px 8px; }
    .field { text-align: left; }
    .field.full { grid-column: 1 / -1; }
    .field label { display: block; margin: 0 0 3px; color: #d0dce6; font-size: .55rem; line-height: 1.1; font-weight: 950; letter-spacing: .04em; text-transform: uppercase; }
    .field input { width: 100%; min-width: 0; border: 1px solid #546b80; border-radius: 7px; padding: 5px 7px; background: rgba(81,99,118,.72); color: #7fd4ef; text-align: center; font-family: var(--hud-mono); font-size: .9rem; font-weight: 1000; outline: 0; }
    .execution-section .field input { color: #7de0a7; }
    .field input:focus { border-color: #35f08a; box-shadow: 0 0 0 3px rgba(53,240,138,.18); }
    .fixed-note { margin: 5px 0 0; color: #8fa5bd; text-align: left; font-size: .56rem; line-height: 1.25; font-weight: 700; }
    .setup-actions { display: grid; width: min(100%, 420px); gap: 8px; padding-bottom: 18px; }
    .setup > .setup-actions, .setup > .setup-actions.has-history { position: relative; z-index: 40; flex: 0 0 auto; grid-template-columns: minmax(0, 2fr) repeat(2, minmax(0, 1fr)); width: min(96vw, 1180px); margin-top: 0; margin-bottom: auto; gap: 6px; padding: 7px 8px max(8px, env(safe-area-inset-bottom)); border: 1px solid rgba(125,160,188,.34); border-top: 0; border-radius: 0 0 13px 13px; background: rgba(5,14,23,.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .setup > .setup-actions .action { min-height: 42px; border: 1px solid #667b8e; border-radius: 8px; padding: 8px; background: linear-gradient(180deg, #e1e6e8, #9daab4); color: #101820; font-size: .74rem; font-weight: 1000; cursor: pointer; }
    .setup > .setup-actions .action.secondary { border-color: #54677a; background: linear-gradient(180deg, #445568, #263442); color: #e0e8ee; font-size: .62rem; }
    .action { border: 0; border-radius: 12px; padding: 12px; background: #35f08a; color: #04130b; font-size: 1.05rem; font-weight: 1000; cursor: pointer; }
    .action.secondary { background: #d5e4f6; color: #07101d; font-size: .85rem; }
    .action.danger { background: #ffdb4d; color: #1a1300; }
    .action:active { transform: scale(.985); }
    .pip-note { grid-column: 1 / -1; min-height: 1em; margin: 0; color: #8ea1b1; font-size: .54rem; }
    .setup-options { width: 100%; border: 1px solid rgba(104,137,165,.4); border-radius: 9px; background: rgba(20,31,42,.82); text-align: left; }
    .setup-options > summary { display: flex; min-height: 36px; align-items: center; justify-content: space-between; padding: 7px 10px; color: #aebfcd; font-size: .61rem; font-weight: 950; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; list-style: none; }
    .setup-options > summary::after { content: "+"; color: #7fd4ef; font-size: .85rem; }
    .setup-options[open] > summary::after { content: "–"; }
    .setup-options-content { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); align-items: start; gap: 7px; padding: 0 7px 7px; }
    .setup-options-content > .advanced-disclosure { grid-column: 1 / -1; }
    .setup-options .setup-section { background: rgba(16,27,37,.78); }
    .ride-progress { position: absolute; top: 8px; left: 50%; z-index: 20; width: min(calc(100% - 24px), 900px); height: 7px; overflow: hidden; transform: translateX(-50%); border-radius: 999px; background: var(--hud-track); }
    .ride-progress-fill { height: 100%; width: 0; border-radius: inherit; background: var(--hud-aero); transition: width .25s linear; }
    .ride-progress-text { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
    .aero, .paused, .fuel, .water, .stretch { background: var(--hud-bg); color: var(--hud-white); }
    .aero.alert .aero-hero { border-color: #9a8461; background: #211e18; }
    .action-screen.finished { border-color: #9a8461; background: #181610; }
    .eyebrow { margin: 5px 0 3px; font-size: clamp(.78rem, 3.8vmin, 1rem); font-weight: 1000; letter-spacing: .16em; text-transform: uppercase; }
    .timer { margin: 0; font-variant-numeric: tabular-nums; font-size: clamp(3.7rem, 25vmin, 6.8rem); line-height: .9; font-weight: 1000; letter-spacing: -.085em; }
    .timer.message { max-width: 100%; color: #c9ab73; font-size: clamp(2.2rem, 15vmin, 4rem); line-height: .86; letter-spacing: -.055em; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); width: min(100%, 380px); margin-top: 8px; border-radius: 11px; overflow: hidden; background: rgba(0,0,0,.22); }
    .stat { padding: 6px 3px; border-right: 1px solid rgba(255,255,255,.13); }
    .stat:last-child { border: 0; }
    .stat-label { display: block; color: #a9c2df; font-size: .55rem; font-weight: 1000; letter-spacing: .08em; text-transform: uppercase; }
    .stat-value { display: block; margin-top: 2px; font-size: clamp(.78rem, 4vmin, 1rem); font-weight: 950; font-variant-numeric: tabular-nums; }
    .schedule { width: min(100%, 380px); margin-top: 9px; padding: 8px 10px; border: 1px solid rgba(255,255,255,.22); border-radius: 12px; background: rgba(1,13,31,.48); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); text-align: left; }
    .schedule-title { margin: 0 0 5px; color: #7dffb1; font-size: .64rem; font-weight: 1000; letter-spacing: .16em; text-transform: uppercase; }
    .reminder-row { display: grid; grid-template-columns: 62px 1fr auto; align-items: center; gap: 6px; margin: 4px 0; font-size: clamp(.68rem, 3.3vmin, .83rem); font-weight: 850; }
    .reminder-type { color: #b6cce5; font-size: .72em; font-weight: 1000; letter-spacing: .09em; text-transform: uppercase; }
    .reminder-time { color: #fff; font-variant-numeric: tabular-nums; font-weight: 1000; }
    .reminder-time.due { color: #ffe000; }
    .hint { position: absolute; bottom: 72px; margin: 0; opacity: .72; font-size: clamp(.62rem, 3vmin, .78rem); font-weight: 950; letter-spacing: .06em; text-transform: uppercase; }
    .action-title { margin: 0 0 7px; font-size: clamp(2.6rem, 18vmin, 4.7rem); line-height: .82; font-weight: 1000; letter-spacing: -.065em; }
    .action-screen .timer { margin-bottom: 13px; }
    .action-screen .instruction { max-width: 96%; margin: 0; font-size: clamp(1.25rem, 7.5vmin, 2rem); line-height: 1.02; font-weight: 950; }
    .paused .timer { font-size: clamp(3.1rem, 21vmin, 5.5rem); }
    .paused-copy { width: min(100%, 350px); margin: 12px 0 0; padding: 10px; border-radius: 12px; background: rgba(0,0,0,.25); font-size: .78rem; line-height: 1.35; font-weight: 750; }
    .finish-button { min-height: 36px; margin-top: 8px; border: 1px solid rgba(255,255,255,.3); border-radius: 8px; padding: 7px 10px; background: rgba(0,0,0,.28); color: inherit; font-size: .65rem; font-weight: 950; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; }
    .review { padding: 18px 14px; }
    .review h1 { margin: 0; font-size: 2rem; letter-spacing: -.05em; }
    .review-date { margin: 4px 0 12px; color: #93aac3; font-size: .7rem; }
    .review-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: min(100%, 420px); }
    .review-card { padding: 10px 6px; border: 1px solid #28425f; border-radius: 11px; background: #0b192b; }
    .review-card strong { display: block; color: #69f7a3; font-size: 1.25rem; font-variant-numeric: tabular-nums; }
    .review-card span { color: #9fb3ca; font-size: .6rem; font-weight: 950; letter-spacing: .08em; text-transform: uppercase; }
    .interval-list { width: min(100%, 420px); margin: 12px 0; padding: 10px; border-radius: 12px; background: #0b192b; text-align: left; }
    .interval-list h2 { margin: 0 0 7px; color: #dbe8f7; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; }
    .interval-line { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid #1d334c; color: #b8c9dc; font-size: .72rem; font-weight: 800; }
    .interval-line b { color: #6dffad; }
    .camera-choice { display: flex; align-items: center; gap: 9px; padding: 9px; border: 1px solid #2f587d; border-radius: 10px; background: #0e2238; text-align: left; }
    .camera-choice input { width: 22px; height: 22px; accent-color: #35f08a; }
    .camera-choice strong { display: block; color: #fff; font-size: .78rem; }
    .camera-choice span { display: block; margin-top: 2px; color: #95abc3; font-size: .62rem; line-height: 1.25; }
    .camera-choice + .camera-choice { margin-top: 7px; }
    .trainer-connect { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 10px; text-align: left; }
    .trainer-connect strong { display: block; color: var(--hud-white); font-size: .8rem; }
    .trainer-connect span { display: block; margin-top: 3px; color: #95a4b6; font-size: .66rem; line-height: 1.3; }
    .trainer-connect-button { min-width: 150px; min-height: 44px; border: 1px solid #486278; border-radius: 10px; padding: 9px 12px; background: #17222c; color: #c8d6e3; font-size: .68rem; font-weight: 1000; letter-spacing: .07em; text-transform: uppercase; cursor: pointer; }
    .trainer-connect-button.connected { border-color: #567462; background: #17251d; color: #a9c8b2; }
    .trainer-connect-button:disabled { opacity: .65; cursor: wait; }
    .trainer-support-note { margin: 8px 0 0; color: #718092; text-align: left; font-size: .62rem; line-height: 1.3; }
    #camera-host { display: none; position: fixed; inset: 0; z-index: 1; overflow: hidden; background: #02060b; }
    #camera-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    body.camera-preview #camera-host { display: block; }
    body.camera-preview #app { position: relative; z-index: 2; }
    .camera-setup { justify-content: flex-end; padding: 18px 14px; color: #fff; background: linear-gradient(transparent 15%, rgba(2,8,16,.25) 42%, rgba(2,8,16,.96) 76%); cursor: default; }
    .camera-panel { width: min(100%, 420px); padding: 13px; border: 1px solid rgba(255,255,255,.22); border-radius: 15px; background: rgba(3,13,25,.84); backdrop-filter: blur(13px); }
    .camera-panel h1 { margin: 0; font-size: clamp(1.6rem, 8vmin, 2.3rem); line-height: .92; letter-spacing: -.045em; }
    .camera-panel p { margin: 7px 0; color: #c0d0e2; font-size: .75rem; line-height: 1.35; font-weight: 700; }
    .camera-step { margin: 7px 0; color: #6dffad; font-size: .64rem; font-weight: 1000; letter-spacing: .14em; text-transform: uppercase; }
    .camera-countdown { margin: 4px 0; color: #fff; font-size: 2.4rem; line-height: 1; font-weight: 1000; font-variant-numeric: tabular-nums; }
    .camera-actions { display: grid; gap: 7px; margin-top: 9px; }
    .camera-error { color: #ffcf55 !important; }
    .camera-badge { position: absolute; top: 27px; left: 10px; z-index: 5; border: 1px solid rgba(255,255,255,.25); border-radius: 999px; padding: 4px 7px; background: rgba(0,0,0,.42); color: #d9e6f4; font-size: .56rem; font-weight: 1000; letter-spacing: .08em; text-transform: uppercase; }
    .camera-badge.aero { border-color: var(--hud-aero); color: #aec0d0; }
    .camera-badge.upright { border-color: var(--hud-upright); color: #c7b7aa; }
    .camera-badge.uncertain { border-color: #a77d63; color: #c9a58e; }
    .camera-learning-prompt { position: absolute; left: 50%; bottom: 72px; z-index: 45; display: grid; grid-template-columns: minmax(0, 1fr) repeat(2, minmax(72px, auto)); align-items: center; gap: 8px; width: min(calc(100% - 16px), 460px); transform: translateX(-50%); border: 1px solid #556171; border-radius: 14px; padding: 9px; background: #171b22; color: var(--hud-white); text-align: left; cursor: default; }
    .aero .camera-learning-prompt { bottom: 12px; }
    .camera-learning-copy strong { display: block; color: #b8c6d4; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
    .camera-learning-copy span { display: block; margin-top: 3px; color: #8994a3; font-size: .59rem; line-height: 1.25; }
    .camera-learning-answer { min-height: 48px; border: 1px solid #4b5665; border-radius: 10px; padding: 7px 10px; background: #202630; color: #e2e8f0; font-size: .75rem; font-weight: 950; cursor: pointer; }
    .camera-learning-answer.yes { border-color: #607b6d; background: #1b2822; color: #b6cabe; }
    .camera-learning-answer:active { background: #2a313c; }
    .ride-control-cluster { display: contents; }
    .ride-utility-controls { position: absolute; top: 27px; right: 10px; z-index: 18; display: flex; align-items: center; gap: 6px; }
    .pip-mini, .camera-auto-toggle, .ride-pause-button { min-height: 42px; border-radius: 9px; padding: 6px 9px; font-size: .62rem; font-weight: 1000; cursor: pointer; }
    .pip-mini { min-width: 42px; border: 1px solid #3a424d; background: #11151b; color: #cbd3dc; }
    .camera-auto-toggle { border: 1px solid #607b6d; background: #121915; color: #9eb5a9; }
    .camera-auto-toggle.off { border-color: #a4b2c2; color: #d5deea; }
    .ride-pause-button { min-width: 68px; border: 1px solid #806f54; background: #282218; color: #d3c19e; letter-spacing: .06em; }
    .camera-review { width: min(100%, 420px); margin: 0 0 12px; padding: 10px; border: 1px solid #285b4a; border-radius: 12px; background: #09231d; text-align: left; }
    .camera-review h2 { margin: 0 0 7px; color: #6dffad; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; }
    .camera-review p { margin: 4px 0; color: #bed6ce; font-size: .7rem; line-height: 1.3; }
    .mode-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .mode-tab { position: relative; min-width: 0; }
    .mode-tab input { position: absolute; opacity: 0; pointer-events: none; }
    .setup .mode-tab span { display: grid; min-height: 30px; place-items: center; border: 1px solid #60778c; border-radius: 999px; background: rgba(68,84,100,.64); color: #d0dbe3; font-size: .55rem; font-weight: 1000; text-align: center; }
    .setup .mode-tab input:checked + span { border-color: #b6c7d5; background: linear-gradient(180deg, #d8e0e5, #7d8d99); color: #10202b; }
    .mode-tab input:focus-visible + span { outline: 3px solid #fff; outline-offset: 2px; }
    .dashboard-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .dashboard-tabs .mode-tab span { align-content: center; gap: 2px; min-height: 40px; border-radius: 7px; }
    .dashboard-tabs .mode-tab strong { font-size: .7rem; letter-spacing: .08em; }
    .dashboard-tabs .mode-tab small { color: #7f95aa; font-size: .58rem; font-weight: 750; }
    .dashboard-tabs .mode-tab input[value="immersive"]:checked + span { border-color: #789fba; background: #142b3a; color: #a9d4ee; }
    .dashboard-tabs .mode-tab input:checked + span small { color: currentColor; opacity: .72; }
    .mode-description { min-height: 0; margin: 6px 0 0; color: #a5b4c0; text-align: left; font-size: .54rem; line-height: 1.3; }
    .observation-toggle { display: none; margin-top: 8px; }
    .setup[data-mode="observation"] .observation-toggle { display: flex; }
    .learning-cards { display: grid; gap: 7px; margin-top: 9px; }
    .learning-cards:empty { display: none; }
    .learning-card { padding: 8px; border: 1px solid #27445f; border-radius: 9px; background: #091522; text-align: left; }
    .learning-card-head { display: flex; justify-content: space-between; gap: 6px; color: #dce8f5; font-size: .65rem; font-weight: 1000; text-transform: uppercase; }
    .source-badge { color: #6dffad; }
    .learning-card p { margin: 4px 0; color: #9fb3ca; font-size: .64rem; line-height: 1.25; }
    .learning-card-actions { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .mini-action { min-height: 32px; border: 1px solid #3b638b; border-radius: 7px; padding: 5px 8px; background: #11263c; color: #e8f1fb; font-size: .6rem; font-weight: 950; cursor: pointer; }
    .coach-empty { margin: 9px 0 0; padding: 8px 9px; border-radius: 9px; background: #0d2133; color: #9fb3ca; text-align: left; font-size: .66rem; line-height: 1.35; }
    .camera-options { margin-top: 8px; }
    .advanced-disclosure { grid-column: 1 / -1; width: 100%; border: 1px solid #252d3e; border-radius: 13px; background: #101625; text-align: left; }
    .advanced-disclosure summary { display: flex; min-height: 44px; align-items: center; justify-content: space-between; padding: 9px 12px; color: #b8c8da; font-size: .7rem; font-weight: 950; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; list-style: none; }
    .advanced-disclosure summary::-webkit-details-marker { display: none; }
    .advanced-disclosure summary::after { content: "+"; color: #6dffad; font-size: 1rem; }
    .advanced-disclosure[open] summary::after { content: "−"; }
    .advanced-content { padding: 0 10px 10px; }
    .advanced-content > p { margin: 0 0 8px; color: #8fa5bd; font-size: .65rem; line-height: 1.35; }
    .learning-management { display: grid; gap: 6px; }
    .learning-management-row { display: flex; min-height: 42px; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 8px; border: 1px solid #243b53; border-radius: 8px; background: #091522; }
    .learning-management-row span { color: #c8d6e6; font-size: .65rem; font-weight: 850; }

    function formatTime(totalSeconds) {
      const numeric = Number(totalSeconds);
      const safe = Number.isFinite(numeric) ? Math.max(0, Math.floor(numeric)) : 0;
      const hours = Math.floor(safe / 3600);
      const minutes = Math.floor((safe % 3600) / 60);
      const seconds = safe % 60;
      return hours > 0
        ? `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`

      const numeric = Number(totalSeconds);
      const safe = Number.isFinite(numeric) ? Math.max(0, Math.floor(numeric)) : 0;

      const minutes = Math.floor((safe % 3600) / 60);
      const seconds = safe % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function totalAeroMs() { return model.accumulatedAeroMs + liveAeroMs(); }
    function currentIntervalMs() { return model.intervalAccumulatedMs + liveAeroMs(); }
    function intervalRemainingSec() { return Math.max(0, model.currentIntervalTargetSec - currentIntervalMs() / 1000); }
    function aeroAdherencePercent() {
      const elapsed = rideMs();
      return elapsed > 0 ? Math.min(100, Math.round(totalAeroMs() / elapsed * 100)) : 0;
    }
    function reminderCadence(type) {
      return type === "water" ? model.waterEverySec : type === "fuel" ? model.fuelEverySec : model.stretchEverySec;
    }

    function getReminderRows() {
      const elapsed = rideMs() / 1000;
      if (!model.remindersEnabled) return [];
      return ACTION_TYPES.map(type => {
        const pending = model.reminders
          .filter(reminder => reminder.type === type && ["pending", "snoozed"].includes(reminder.status))
          .sort((a, b) => a.dueAtSec - b.dueAtSec)[0];
        const dueAt = pending?.dueAtSec ?? model.nextDue[type];
        return { type, dueAt, remaining: dueAt - elapsed, reminderId: pending?.id || null };
      }).sort((a, b) => a.dueAt - b.dueAt);
    }

    function getDueActions() {
      return getActiveReminders(model.reminders, rideMs() / 1000);
    }

    function materializeDueReminders() {
      return materializeReminderOccurrences({
        reminders: model.reminders,
        nextDue: model.nextDue,
        elapsedSec: rideMs() / 1000,
        cadences: { water: model.waterEverySec, fuel: model.fuelEverySec, stretch: model.stretchEverySec },
        sources: model.intervalSources,
        enabled: model.remindersEnabled
      });
    }

    function progressMarkup() {
      const elapsedSec = rideMs() / 1000;
      const progress = Math.min(100, elapsedSec / model.plannedRideSec * 100);
      return `<div class="ride-progress" role="progressbar" aria-label="Total ride time" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${Math.round(progress)}" aria-valuetext="${formatTime(elapsedSec)} of ${formatTime(model.plannedRideSec)}"><div class="ride-progress-fill" style="width:${progress}%"></div><div class="ride-progress-text" id="ride-progress-text">RIDE ${formatTime(elapsedSec)} / ${formatTime(model.plannedRideSec)}</div></div>`;
    }

    function phaseContext() {
      return getRidePhase(rideMs() / 1000, model.plannedRideSec);
    }

    function currentChallenge() {
      return getLiveChallenge({
        reminderRows: getReminderRows(),
        intervalRemainingSec: intervalRemainingSec(),
        intervalElapsedSec: currentIntervalMs() / 1000
      });
    }

    function ridePhasesMarkup() {
      const current = phaseContext();
      const items = RIDE_PHASES.map((phase, index) => {
        const state = index < current.index ? " complete" : index === current.index ? " current" : "";
        const currentAttribute = index === current.index ? ' aria-current="step"' : "";
        return `<li class="ride-phase${state}"${currentAttribute}><span>Phase ${index + 1}</span><strong>${phase.shortName}</strong></li>`;
      }).join("");
      return `<div class="ride-phase-strip" aria-label="Ride phases"><ol>${items}</ol></div>`;
    }

    function personalBestMarkup() {
      const bestSec = Math.max(model.personalBestSec, model.bestIntervalMs / 1000);
      const currentSec = currentIntervalMs() / 1000;
      if (!bestSec) return `<span>FIRST TARGET</span><strong>${formatTime(model.currentIntervalTargetSec)}</strong>`;
      const difference = bestSec - currentSec;
      return difference > 0
        ? `<span>BEST ${formatTime(bestSec)}</span><strong>${formatTime(difference)} TO MATCH</strong>`
        : `<span>PERSONAL BEST</span><strong>+${formatTime(Math.abs(difference))}</strong>`;
    }

    function planStatusMarkup() {
      const status = getPlanStatus(model.reminders, model.completedActions);
      return `<p class="ride-plan-status ${status.tone}" id="ride-plan-status">${status.text}</p>`;
    }

    function quickActionDockMarkup() {
      const labels = { water: "DRANK", fuel: "FUEL TAKEN", stretch: "STRETCH DONE" };
      return `<div class="quick-action-dock" aria-label="Completed actions">${ACTION_TYPES.map((type, index) => {
        const locked = now() < model.actionLocks[type];
        return `<button class="quick-action ${type}-button${locked ? " locked" : ""}" type="button" data-log-action="${type}" data-action-type="${type}" data-default-label="${labels[type]}" aria-label="${labels[type]}" aria-keyshortcuts="${index + 1}" ${locked ? "disabled" : ""}>${locked ? "✓ LOGGED" : labels[type]}</button>`;
      }).join("")}</div>`;
    }

    function actionFeedbackMarkup() {
      const feedback = model.actionFeedback && now() < model.actionFeedback.expiresAt ? model.actionFeedback : null;
      return feedback ? `<div class="action-toast">${feedback.text}</div>` : "";
    }

    function cameraLearningPromptMarkup() {
      const prompt = model.cameraLearningPrompt;
      if (!prompt || now() >= prompt.expiresAt || !["aero", "paused"].includes(model.state)) return "";
      const detected = prompt.detectedState;
      const opposite = detected === "aero" ? "upright" : "aero";
      return `<div class="camera-learning-prompt" id="camera-learning-prompt" role="group" aria-label="Camera posture check">
        <div class="camera-learning-copy"><strong>${detected.toUpperCase()}?</strong><span>Is the camera right? No teaches ${opposite}.</span></div>
        <button class="camera-learning-answer yes" type="button" data-camera-learning-answer="yes">YES</button>
        <button class="camera-learning-answer" type="button" data-camera-learning-answer="no">NO</button>
      </div>`;
    }

    function activeRideChromeMarkup() { return actionFeedbackMarkup() + cameraLearningPromptMarkup() + quickActionDockMarkup(); }

    function learningCardsMarkup(history, settings, plannedRideSec, mode) {
      if (mode !== "coach") return "";
      const recommendations = buildRecommendations(history, plannedRideSec, settings.learningResetAt);
      const inputIds = { water: "water-every", fuel: "fuel-every", stretch: "stretch-every" };
      const cards = ACTION_TYPES.flatMap(type => {
        const recommendation = recommendations[type];
        const accepted = settings.acceptedIntervals[type];
        const ignored = model.ignoredRecommendations[type] === recommendation.suggestedSec;
        const usingSuggestion = recommendation.sufficient && accepted?.source === "history" && accepted.seconds === recommendation.suggestedSec;
        if (recommendation.sufficient && ignored) {
          return [`<div class="learning-card" data-learning-card="${type}"><div class="learning-card-head"><span>${ACTION_LABELS[type]}</span><span class="source-badge">HIDDEN</span></div><p>Recommendation hidden for this setup.</p><div class="learning-card-actions"><button class="mini-action show-recommendation" type="button" data-type="${type}">SHOW AGAIN</button></div></div>`];
        }
        if (recommendation.sufficient) {
          const actionButtons = usingSuggestion
            ? `<button class="mini-action edit-recommendation" type="button" data-type="${type}" data-input="${inputIds[type]}">EDIT CURRENT</button>`
            : `<button class="mini-action use-recommendation" type="button" data-type="${type}" data-input="${inputIds[type]}" data-seconds="${recommendation.suggestedSec}" data-rides="${recommendation.ridesUsed}">USE ${Math.round(recommendation.suggestedSec / 60)}m</button><button class="mini-action edit-recommendation" type="button" data-type="${type}" data-input="${inputIds[type]}">EDIT</button><button class="mini-action ignore-recommendation" type="button" data-type="${type}" data-seconds="${recommendation.suggestedSec}">IGNORE</button>`;
          return [`<div class="learning-card" data-learning-card="${type}"><div class="learning-card-head"><span>${ACTION_LABELS[type]}</span><span class="source-badge">${usingSuggestion ? "IN USE" : "SUGGESTION"}</span></div><p>Observed median ${Math.round(recommendation.observedMedianSec / 60)} min across ${recommendation.ridesUsed} similar rides. Suggested reminder ${Math.round(recommendation.suggestedSec / 60)} min.</p><div class="learning-card-actions">${actionButtons}</div></div>`];
        }
        if (accepted?.source === "history") {
          return [`<div class="learning-card" data-learning-card="${type}"><div class="learning-card-head"><span>${ACTION_LABELS[type]}</span><span class="source-badge">IN USE</span></div><p>Using a ${Math.round(accepted.seconds / 60)} min history-based interval from ${accepted.ridesUsed || 0} similar rides.</p><div class="learning-card-actions"><button class="mini-action edit-recommendation" type="button" data-type="${type}" data-input="${inputIds[type]}">EDIT CURRENT</button></div></div>`];
        }
        return [];
      });
      return cards.length ? cards.join("") : '<p class="coach-empty">No history-based changes are ready yet. Your current intervals remain unchanged while the HUD learns from comparable rides.</p>';
    }

    function learningManagementMarkup() {
      return ACTION_TYPES.map(type => model.learningResetConfirmType === type
        ? `<div class="learning-management-row"><span>Reset ${ACTION_LABELS[type].toLowerCase()} learning from today?</span><div class="learning-card-actions"><button class="mini-action confirm-reset-learning" type="button" data-type="${type}">CONFIRM</button><button class="mini-action cancel-reset-learning" type="button">CANCEL</button></div></div>`
        : `<div class="learning-management-row"><span>${ACTION_LABELS[type]} learning</span><button class="mini-action reset-learning" type="button" data-type="${type}">RESET</button></div>`
      ).join("");
    }

    function setupMarkup() {
      const pipSupported = "documentPictureInPicture" in window;
      const history = loadHistory();
      const settings = loadSettings();
      const mode = model.rideMode || settings.preferredMode;
      const dashboardStyle = model.dashboardStyle || settings.dashboardStyle;
      const waterValue = Math.round((settings.acceptedIntervals.water?.seconds || 10 * 60) / 60);
      const fuelValue = Math.round((settings.acceptedIntervals.fuel?.seconds || 30 * 60) / 60);
      const stretchValue = Math.round((settings.acceptedIntervals.stretch?.seconds || 20 * 60) / 60);
      return `<section class="screen setup" data-mode="${mode}" data-camera-enabled="false">
        <header class="setup-header"><h1 class="brand">TRI HUD</h1><p class="subtitle">Aero progression and race-day timing</p></header>
        <div class="setup-shell">
          <div class="setup-section setup-span"><p class="section-title"><span class="section-icon" aria-hidden="true">&#9881;</span>Training mode</p>
            <div class="mode-tabs" role="radiogroup" aria-label="Training mode">
              <label class="mode-tab"><input type="radio" name="ride-mode" value="fixed" ${mode === "fixed" ? "checked" : ""}><span>FIXED</span></label>
              <label class="mode-tab"><input type="radio" name="ride-mode" value="observation" ${mode === "observation" ? "checked" : ""}><span>OBSERVE</span></label>
              <label class="mode-tab"><input type="radio" name="ride-mode" value="coach" ${mode === "coach" ? "checked" : ""}><span>COACH</span></label>
            </div>
            <p class="mode-description" id="mode-description"></p>
            <label class="camera-choice observation-toggle" for="observation-reminders"><input id="observation-reminders" type="checkbox" ${settings.observationReminders ? "checked" : ""}><span><strong>Use fixed reminders while observing</strong><span>Off by default so natural actions can be learned without prompts.</span></span></label>
            <div class="learning-cards" id="learning-cards">${learningCardsMarkup(history, settings, 90 * 60, mode)}</div>
          </div>
          <div class="setup-section ride-plan-section"><p class="section-title"><span class="section-icon" aria-hidden="true">&#9650;</span>Ride plan</p><div class="fields">
            <div class="field"><label for="ride-minutes">Planned ride (min)</label><input id="ride-minutes" type="number" min="1" max="600" value="90"></div>
            <div class="field"><label for="aero-goal">Total Aero goal (min)</label><input id="aero-goal" type="number" min="1" max="600" value="60"></div>
            <div class="field"><label for="interval-minutes">First Aero interval (min)</label><input id="interval-minutes" type="number" min="1" max="180" value="10"></div>
            <div class="field"><label for="progression-minutes">Add each interval (min)</label><input id="progression-minutes" type="number" min="0" max="60" value="1"></div>
          </div></div>
          <div class="setup-section execution-section"><p class="section-title"><span class="section-icon" aria-hidden="true">&#9889;</span>Race execution</p><div class="fields">
            <div class="field"><label for="water-every">Water every (min)</label><input id="water-every" type="number" min="1" max="180" value="${waterValue}"></div>
            <div class="field"><label for="fuel-every">Fuel every (min)</label><input id="fuel-every" type="number" min="1" max="180" value="${fuelValue}"></div>
            <div class="field"><label for="stretch-every">Mobility every (min)</label><input id="stretch-every" type="number" min="1" max="180" value="${stretchValue}"></div>
            <div class="field"><label for="fuel-seconds">Fuel break (sec)</label><input id="fuel-seconds" type="number" min="1" max="600" value="60"></div>
          </div><p class="fixed-note">Water and mobility are one-tap records. Only fueling uses a countdown.</p></div>
          <details class="setup-options"><summary>Dashboard &amp; equipment</summary><div class="setup-options-content">
          <div class="setup-section setup-span"><p class="section-title"><span class="section-icon" aria-hidden="true">&#9638;</span>Dashboard</p>
            <div class="mode-tabs dashboard-tabs" role="radiogroup" aria-label="Dashboard style">
              <label class="mode-tab"><input type="radio" name="dashboard-style" value="practical" ${dashboardStyle === "practical" ? "checked" : ""}><span><strong>PRACTICAL</strong><small>Maximum clarity</small></span></label>
              <label class="mode-tab"><input type="radio" name="dashboard-style" value="immersive" ${dashboardStyle === "immersive" ? "checked" : ""}><span><strong>IMMERSIVE</strong><small>Cinematic rider view</small></span></label>
            </div>
            <p class="fixed-note" id="dashboard-description">${dashboardStyle === "immersive" ? "Rider backdrop with floating translucent controls. Compact PiP remains distraction-free." : "Low-glare three-zone riding screen with the strongest timer contrast."}</p>
          </div>
          <div class="setup-section setup-span"><p class="section-title"><span class="section-icon" aria-hidden="true">&#8644;</span>Smart trainer <span class="section-optional">Optional</span></p>
            <div class="trainer-connect"><div><strong>${model.trainerStatus === "connected" ? model.trainerDeviceName || "Tacx Bushido Smart" : "Tacx Bushido Smart"}</strong><span id="trainer-setup-status">${model.trainerMessage}</span></div>
              <button class="trainer-connect-button${model.trainerStatus === "connected" ? " connected" : ""}" id="${model.trainerStatus === "connected" ? "disconnect-trainer" : "connect-trainer"}" type="button" ${model.trainerStatus === "connecting" || !trainer.supported ? "disabled" : ""}>${!trainer.supported ? "NOT SUPPORTED" : model.trainerStatus === "connecting" ? "CONNECTING..." : model.trainerStatus === "connected" ? "DISCONNECT" : "CONNECT TRAINER"}</button>
            </div><p class="trainer-support-note">Start pedalling to wake the trainer before connecting. TiA reads measurements only and does not change resistance.</p>
          </div>
          <div class="setup-section setup-span"><p class="section-title"><span class="section-icon" aria-hidden="true">&#9678;</span>Camera <span class="section-optional">Optional</span></p>
            <label class="camera-choice" for="camera-enabled"><input id="camera-enabled" type="checkbox"><span><strong>Use position detection</strong><span>Compare Aero and upright positions locally. No video is uploaded or saved.</span></span></label>
            <div class="camera-options" id="camera-options" hidden>
              <label class="camera-choice" for="camera-auto"><input id="camera-auto" type="checkbox" checked disabled><span><strong>Automatically control Aero clock</strong><span>Stable upright pauses; stable Aero resumes. Uncertain readings preserve the current clock.</span></span></label>
            </div>
          </div>
          <details class="advanced-disclosure"><summary>Learning & data</summary><div class="advanced-content">
            <p>Maintenance controls only. Resetting learning keeps your saved ride reviews but starts future recommendations from today.</p>
            <div class="learning-management" id="learning-management">${learningManagementMarkup()}</div>
          </div></details>
          </div></details>
        </div>
        <div class="setup-actions${history.length ? " has-history" : ""}">
          <button class="action" id="start-ride" type="button">START RIDE</button>
          <button class="action secondary" id="pop-out" type="button" ${pipSupported ? "" : "disabled"}>${pipSupported ? "POP OUT" : "PiP N/A"}</button>
          <button class="action secondary" id="view-history" type="button">HISTORY</button>
          ${history.length ? `<p class="pip-note">Last ride: ${formatTime(history[0].rideSeconds)} • ${formatTime(history[0].aeroSeconds)} Aero</p>` : pipSupported ? "" : '<p class="pip-note" id="pip-note">Use recent Chrome or Edge for Pop Out.</p>'}
        </div>
      </section>`;
    }

    function cameraSetupMarkup() {
      const snapshot = model.cameraSnapshot;
      const capturing = snapshot.capture;
      const armsTracked = snapshot.calibrationFeatures?.some(feature => feature.startsWith("arm"));
      const trackingSummary = armsTracked ? "Torso and arm support are both tracking." : "Torso is tracking; move slightly farther back if you want arm support included.";
      const controlSummary = model.pendingRideValues?.cameraAuto
        ? "Stable upright will pause the Aero clock and stable Aero will resume it. Manual override remains available."
        : "Camera control is off; manual clicks will control every timer.";
      const content = {
        permission: { step: "Camera setup", title: "POSITION CHECK", copy: "Place the laptop to your side or at a three-quarter angle. The camera needs a clear view of your shoulders, hips and arms.", button: '<button class="action" id="enable-camera" type="button">ENABLE CAMERA</button>' },
        loading: { step: "Loading local pose model", title: "ONE MOMENT", copy: "Preparing private on-device position tracking. No video is uploaded or saved.", button: "" },
        upright: { step: "Calibration 1 of 2", title: "RIDE UPRIGHT", copy: "Pedal easily in your normal seated upright position. When settled, capture a short sample.", button: '<button class="action" id="capture-upright" type="button">CAPTURE UPRIGHT</button>' },
        aero: { step: "Calibration 2 of 2", title: "HOLD AERO", copy: "Move into your normal Aero position and keep pedalling steadily during the capture.", button: '<button class="action" id="capture-aero" type="button">CAPTURE AERO</button>' },
        ready: { step: `Calibration quality ${snapshot.calibrationQuality || 0}%`, title: "CAMERA READY", copy: `${trackingSummary} ${controlSummary}`, button: '<button class="action" id="begin-calibrated-ride" type="button">START RIDE</button>' },
        error: { step: "Calibration needs attention", title: "TRY AGAIN", copy: model.cameraError || snapshot.error || "The camera could not be calibrated.", button: '<button class="action" id="retry-camera" type="button">RETRY CAMERA SETUP</button>' }
      }[model.cameraStep];
      return `<section class="screen camera-setup"><div class="camera-panel">
        <p class="camera-step">${content.step}</p><h1>${capturing ? `HOLD ${capturing.label.toUpperCase()}` : content.title}</h1>
        ${capturing ? `<p class="camera-countdown" id="camera-countdown">${Math.ceil(capturing.remaining)}</p><p>Stay steady and keep your shoulders and hips visible.</p>` : `<p class="${model.cameraStep === "error" ? "camera-error" : ""}">${content.copy}</p>`}
        <div class="camera-actions">${capturing ? "" : content.button}<button class="action secondary" id="skip-camera" type="button">CONTINUE WITHOUT CAMERA</button></div>
      </div></section>`;
    }

    function scheduleMarkup() {
      const visualOrder = ["water", "fuel", "stretch"];
      const labels = { stretch: "Stretch", fuel: "Fuel", water: "Water" };
      const shortcuts = { water: 1, fuel: 2, stretch: 3 };
      const icons = {
        water: '<span class="card-orb-icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M24 4C18 13 10 21 10 30a14 14 0 0 0 28 0C38 21 30 13 24 4Z"/><path d="M17 31c1 5 4 7 9 8"/></svg></span>',
        fuel: '<span class="card-orb-icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M27 3 10 28h12l-2 17 18-27H26l1-15Z"/></svg></span>',
        stretch: '<span class="card-orb-icon" aria-hidden="true"><svg viewBox="0 0 48 48"><circle cx="29" cy="9" r="4"/><path d="m28 14-7 9 7 6 7-7M21 23l-9 4M28 29l-5 14M28 29l11 11M34 19l7 3"/></svg></span>'
      };
      const rows = Object.fromEntries(getReminderRows().map(item => [item.type, item]));
      const pending = getDueActions();
      const elapsed = rideMs() / 1000;
      const cards = visualOrder.map(type => {
        const row = rows[type];
        const reminder = pending.find(item => item.type === type) || null;
        const locked = now() < model.actionLocks[type];
        const remaining = model.remindersEnabled ? Math.max(0, row?.remaining ?? model.nextDue[type] - elapsed) : 0;
        const progressDegrees = model.remindersEnabled ? Math.max(0, Math.min(360, remaining / reminderCadence(type) * 360)) : 0;
        const progressPercent = model.remindersEnabled ? Math.max(0, Math.min(100, 100 - remaining / reminderCadence(type) * 100)) : 0;
        const logged = model.completedActions.filter(action => action.type === type).length;
        const detail = type === "fuel" ? model.currentFuel : type === "stretch" ? model.currentMobility : "Hydration schedule";
        const extra = type === "water"
          ? `<span class="immersive-extra water-schedule" aria-hidden="true"><span>NEXT <b>${formatTime(model.nextDue.water)}</b></span><span>AFTER <b>${formatTime(model.nextDue.water + reminderCadence(type))}</b></span><span>THEN <b>${formatTime(model.nextDue.water + reminderCadence(type) * 2)}</b></span></span>`
          : type === "fuel"
            ? `<span class="immersive-extra fuel-schedule" aria-hidden="true"><span>NEXT <b>${formatTime(model.nextDue.fuel)}</b></span><span>AFTER <b>${formatTime(model.nextDue.fuel + reminderCadence(type))}</b></span><span>THEN <b>${formatTime(model.nextDue.fuel + reminderCadence(type) * 2)}</b></span></span>`
          : type === "stretch"
            ? `<span class="immersive-extra mobility-plan" aria-hidden="true">${mobilityPlan.map(item => `<span class="${item === model.currentMobility ? "current" : ""}">${item.split(" (")[0]}</span>`).join("")}</span>`
            : "";
        const sameTypePending = pending.filter(item => item.type === type).length;
        const isUrgent = reminder?.id === pending[0]?.id;
        const queueBadge = reminder
          ? `<span class="card-queue-badge">${isUrgent ? `1 / ${pending.length}` : sameTypePending > 1 ? `+${sameTypePending - 1}` : "Queued"}</span>`
          : "";
        const actionAttributes = reminder
          ? `class="dashboard-card type-${type} due${isUrgent ? " urgent" : ""} reminder-done" data-reminder-id="${reminder.id}" aria-label="Complete ${labels[type]} reminder"`
          : `class="dashboard-card type-${type}" data-log-action="${type}" aria-label="Record ${labels[type]} completed"`;
        return `<button ${actionAttributes} type="button" data-dashboard-card="${type}" data-action-type="${type}" data-default-label="${reminder ? "TAP WHEN DONE" : ""}" aria-keyshortcuts="${shortcuts[type]}" ${locked ? "disabled" : ""}>
          ${queueBadge}<span class="status-ring" data-reminder-ring="${type}" style="--ring-progress:${progressDegrees}deg" aria-hidden="true">${icons[type]}<strong class="card-time reminder-time${reminder ? " due" : ""}" data-reminder="${type}">${model.remindersEnabled ? formatTime(remaining) : "—:—"}</strong></span>
          <span class="card-label">${labels[type]}</span><span class="immersive-card-data"><small>${detail}</small><span><b>${logged}</b> LOGGED <b>${Math.round(progressPercent)}%</b> TO NEXT</span><i><em style="width:${progressPercent}%"></em></i></span>${extra}<span class="card-action">${locked ? "✓ LOGGED" : reminder ? "TAP WHEN DONE" : ""}</span>
        </button>`;
      }).join("");
      const urgent = pending[0];
      const resolution = urgent ? `<div class="reminder-resolution" aria-label="${ACTION_LABELS[urgent.type]} reminder controls">
        <span class="resolution-label"><span data-resolution-overdue="${urgent.id}">${formatTime(Math.max(0, elapsed - urgent.dueAtSec))} late</span> • ${ACTION_LABELS[urgent.type]} • 1 of ${pending.length}</span>
        <button class="resolution-action reminder-snooze" type="button" data-reminder-id="${urgent.id}">SNOOZE 5m</button>
        <button class="resolution-action reminder-skip" type="button" data-reminder-id="${urgent.id}">SKIP</button>
      </div>` : "";
      return `<div class="reminder-zone"><div class="reminder-card-grid" aria-label="Stretch, fuel and hydration timers">${cards}</div>${resolution}</div>`;
    }

    function rideControlsMarkup() {
      const camera = model.cameraSnapshot;
      const cameraBadge = model.cameraEnabled
        ? `<div class="camera-badge ${camera.stableState || "uncertain"}" id="camera-badge">CAMERA ${(camera.stableState || "uncertain").toUpperCase()} ${Math.round((camera.confidence || 0) * 100)}%</div>`
        : "";
      const autoToggle = model.cameraEnabled
        ? `<button class="camera-auto-toggle${model.cameraAutoControl ? "" : " off"}" id="camera-auto-toggle" type="button">${model.cameraAutoControl ? "AUTO ON" : "AUTO OFF"}</button>`
        : "";
      const pip = "documentPictureInPicture" in window ? '<button class="pip-mini" id="pip-ride" type="button">PiP</button>' : "";
      return `<div class="ride-control-cluster">${cameraBadge}<div class="ride-utility-controls">${autoToggle}${pip}<button class="ride-pause-button" id="pause-ride" type="button" aria-label="Pause the entire ride" aria-keyshortcuts="P">PAUSE</button></div></div>`;
    }

    function trainerMetricsMarkup() {
      if (!model.trainerRideEnabled) return "";
      const data = model.trainerSnapshot;
      return `<div class="trainer-metrics${data.isStopped ? " is-stopped" : ""}" id="trainer-metrics" aria-label="Smart trainer measurements">
        <span>Power<strong id="trainer-watts">${Number.isFinite(data.watts) ? `${Math.round(data.watts)} W` : "-- W"}</strong></span>
        <span>Cadence<strong id="trainer-cadence">${Number.isFinite(data.cadence) ? `${Math.round(data.cadence)} RPM` : "-- RPM"}</strong></span>
        <span>Stops<strong id="trainer-stops">${data.stopCount}</strong></span>
        <span>Stopped<strong id="trainer-stopped-time">${formatTime(data.stoppedMs / 1000)}</strong></span>
      </div>`;
    }

    function aeroMarkup({ paused = false } = {}) {
      const due = getDueActions();
      const challenge = currentChallenge();
      const positionTimes = getPositionTimes(rideMs(), totalAeroMs());
      const title = model.rideTargetReached
        ? "RIDE COMPLETE"
        : model.intervalComplete
          ? "BREAK TIME"
          : `CURRENT CHALLENGE • ${challenge.label}`;
      const subtitle = model.rideTargetReached
        ? "TAP TO FINISH & REVIEW"
        : model.intervalComplete
          ? "TAP TO RECOVER"
          : due.length
            ? `${ACTION_LABELS[due[0].type].toUpperCase()} DUE • TAP TO START BREAK`
            : "";
      const headline = formatHeroTime(model.intervalComplete || model.rideTargetReached ? 0 : challenge.remainingSec);
      const advanceLabel = model.rideTargetReached
        ? "Finish and review"
        : model.intervalComplete
          ? "Start recovery"
          : due.length
            ? "Start next due break"
            : paused
              ? "Resume Aero"
              : "Pause Aero";
      const personalBestSec = Math.max(model.personalBestSec, model.bestIntervalMs / 1000);
      const challengeProgress = personalBestSec
        ? Math.min(100, currentIntervalMs() / 10 / personalBestSec)
        : Math.min(100, currentIntervalMs() / 10 / Math.max(1, model.currentIntervalTargetSec));
      return `<section class="screen active-ride aero ${model.dashboardStyle === "immersive" ? "immersive" : "practical"}${model.intervalComplete || model.rideTargetReached ? " alert" : ""}" data-dashboard-style="${model.dashboardStyle || "practical"}" data-advance="true" role="region" aria-label="Aero training dashboard. Click the background to advance.">
        ${progressMarkup()}<div class="ride-phase-header">${ridePhasesMarkup()}${rideControlsMarkup()}</div><button class="screen-advance-control" type="button" aria-keyshortcuts="Enter Space">${advanceLabel}</button><div class="aero-dashboard">
          <section class="aero-hero" aria-label="Current Aero interval">
            <button class="hero-tap-target" id="aero-hero-action" type="button" aria-label="${advanceLabel}" aria-keyshortcuts="Enter Space"><span class="visually-hidden">${advanceLabel}</span></button>
            <span class="aero-interval">Interval ${model.intervalNumber} • ${formatTime(model.currentIntervalTargetSec)} target</span>
            <h1 class="aero-title">${title}</h1><div class="aero-clock"><span class="timer${model.intervalComplete || model.rideTargetReached ? " message" : ""}" id="aero-timer">${headline}</span><span class="aero-percentage" id="aero-percentage">(${aeroAdherencePercent()}%)</span></div>
            <div class="challenge-progress" aria-hidden="true"><div class="challenge-progress-fill" id="challenge-progress-fill" style="width:${challengeProgress}%"></div></div>
            <p class="challenge-best" id="challenge-best">${personalBestMarkup()}</p>
            ${subtitle ? `<p class="aero-subtitle">${subtitle}</p>` : ""}
            <div class="hero-metrics" aria-label="Ride position times"><span>Overall <strong id="overall-time">${formatTime(positionTimes.overallMs / 1000)}</strong></span><span>Aero <strong id="total-aero">${formatTime(positionTimes.aeroMs / 1000)}</strong></span><span>Upright <strong id="upright-time">${formatTime(positionTimes.uprightMs / 1000)}</strong></span></div>${trainerMetricsMarkup()}
          </section><div class="immersive-road" aria-hidden="true"><span></span><span></span><span></span></div>${scheduleMarkup()}${planStatusMarkup()}
        </div>${cameraLearningPromptMarkup()}${actionFeedbackMarkup()}
      </section>`;
    }

    function pausedMarkup() {
      return aeroMarkup({ paused: true });
    }

    function rideSessionPausedMarkup() {
      const confirmingReview = model.rideExitConfirmation === "review";
      const confirmingMenu = model.rideExitConfirmation === "menu";
      return `<section class="screen active-ride ride-session-paused" role="region" aria-label="Ride paused. Ride time, reminders and Aero time are stopped.">
        ${progressMarkup()}<p class="eyebrow">Ride Paused</p><p class="timer">${formatTime(rideMs() / 1000)}</p>
        <div class="ride-pause-panel">
          <p class="ride-pause-copy">Ride time, reminders and your Aero interval are frozen until you resume.</p>
          <button class="ride-resume-action" id="resume-ride" type="button" aria-keyshortcuts="P">RESUME RIDE</button>
          <div class="ride-exit-actions">
            <button class="ride-exit-action end${confirmingReview ? " confirm" : ""}" id="finish-ride" type="button">${confirmingReview ? "CONFIRM END" : "END &amp; REVIEW"}</button>
            <button class="ride-exit-action${confirmingMenu ? " confirm" : ""}" id="ride-main-menu" type="button">${confirmingMenu ? "CONFIRM MENU" : "BACK TO MAIN MENU"}</button>
          </div>
          <p class="ride-save-note">${model.rideExitConfirmation ? "Ride is still paused. Tap the highlighted option again to confirm." : "Ending or returning to the menu saves this ride first."}</p>
        </div>
      </section>`;
    }

    function actionMarkup() {
      const type = model.currentAction;
      const meta = ACTION_META[type];
      const timed = type === "fuel";
      const remaining = timed && !model.actionFinished ? Math.ceil((model.actionEndsAt - now()) / 1000) : 0;
      const status = timed ? (model.actionFinished ? meta.ready : formatTime(remaining)) : meta.prompt;
      const instruction = type === "fuel" ? model.currentFuel : type === "water" ? "Take a proper drink now" : model.currentMobility;
      const otherPending = Math.max(0, getDueActions().filter(reminder => reminder.id !== model.currentReminderId).length);
      const resolutionButtons = model.currentReminderId
        ? '<button class="pending-action action-done" type="button">DONE</button><button class="pending-action action-snooze" type="button">SNOOZE 5m</button><button class="pending-action action-skip" type="button">SKIP</button>'
        : '<button class="pending-action action-done" type="button" style="grid-column:1/-1">DONE</button>';
      return `<section class="screen active-ride action-screen ${meta.className}${model.actionFinished ? " finished" : ""}" data-advance="true" role="region" aria-label="${meta.title} break. Click the background when complete.">
        ${progressMarkup()}${rideControlsMarkup()}<button class="screen-advance-control" type="button" aria-keyshortcuts="Enter Space">Complete break</button><p class="action-title">${meta.title}</p>
        <p class="timer${!timed || model.actionFinished ? " message" : ""}"${timed ? ' id="action-timer"' : ""}>${status}</p>
        <p class="instruction">${instruction}</p>${otherPending ? `<p class="pending-count">+${otherPending} reminder${otherPending === 1 ? "" : "s"} queued</p>` : ""}
        <div class="pending-actions">${resolutionButtons}</div>
        <p class="hint">Use Done, Snooze or Skip</p>${activeRideChromeMarkup()}
      </section>`;
    }

    function reviewActionSection(summary, type) {
      if (summary.legacy?.actionDetailsUnavailable) {
        const historicCount = Number(summary.legacy.counts?.[type] || 0);
        return `<div class="review-section"><h2><span>${ACTION_LABELS[type]}</span><span>${historicCount} recorded</span></h2><p class="review-detail">This older ride saved the total only. Detailed timestamps, intervals, reasons and reminder outcomes were not available, so they have not been invented.</p></div>`;
      }
      const stats = summary.actionStats?.[type] || calculateActionStats(summary.actions || [], type, summary.rideSeconds);
      const reminders = summary.reminderStats?.[type] || calculateReminderStats(summary.reminders || [], type);
      const reasons = Object.entries(stats.reasons || {}).sort((a, b) => b[1] - a[1]).map(([reason, count]) => `${reason} ${count}`).join(" • ") || "None selected";
      const later = stats.laterRideChange === "longer" ? `Intervals widened ${Math.abs(stats.laterRideChangePercent)}% later in the ride.`
        : stats.laterRideChange === "shorter" ? `Intervals shortened ${Math.abs(stats.laterRideChangePercent)}% later in the ride.`
        : stats.laterRideChange === "stable" ? "Intervals remained broadly stable later in the ride." : "More actions are needed to compare early and late patterns.";
      const aeroLinked = type === "stretch" ? (summary.actions || []).filter(action => action.type === "stretch" && action.aeroIntervalNumber).length : null;
      const value = seconds => Number.isFinite(seconds) ? formatTime(seconds) : "—";
      return `<div class="review-section"><h2><span>${ACTION_LABELS[type]}</span><span>${stats.totalActions} completed</span></h2><div class="review-stats">
        <span>Average <strong>${value(stats.averageIntervalSec)}</strong></span><span>Median <strong>${value(stats.medianIntervalSec)}</strong></span>
        <span>Shortest <strong>${value(stats.shortestIntervalSec)}</strong></span><span>Longest <strong>${value(stats.longestIntervalSec)}</strong></span>
        <span>First <strong>${value(stats.firstActionSec)}</strong></span><span>Final <strong>${value(stats.finalActionSec)}</strong></span>
      </div><p class="review-detail"><strong>Consistency:</strong> ${stats.consistencyLabel}${Number.isFinite(stats.consistencyScore) ? ` (${stats.consistencyScore}%)` : ""}<br><strong>Reminders:</strong> ${reminders.planned} planned • ${reminders.completed} done • ${reminders.skipped} skipped • ${reminders.missed} missed • ${reminders.snoozed} snoozes<br><strong>Reasons:</strong> ${reasons}<br>${later}${type === "stretch" ? `<br><strong>Aero context:</strong> ${aeroLinked} stretch actions were linked to an Aero interval number.` : ""}</p></div>`;
    }

    function reviewReasonEditorMarkup(summary) {
      if (model.reviewReasonEditorDismissed || summary.legacy?.actionDetailsUnavailable) return "";
      const pending = (summary.actions || [])
        .filter(action => ACTION_TYPES.includes(action.type) && !action.reason)
        .sort((a, b) => Number(a.rideElapsedSec) - Number(b.rideElapsedSec));
      const action = pending[0];
      if (!action) return "";
      const completedLabel = { water: "DRANK", fuel: "FUEL TAKEN", stretch: "STRETCH DONE" }[action.type];
      return `<div class="review-section review-reason-editor"><h2><span>Optional ride context</span><span>1 of ${pending.length}</span></h2>
        <p class="review-detail">Add a reason only if it will improve future coaching. This question was deliberately postponed until after the ride.</p>
        <div class="review-reason-action"><strong>${completedLabel} • ${formatTime(action.rideElapsedSec)}</strong></div>
        <div class="review-reason-chips" role="group" aria-label="Reason for ${completedLabel.toLowerCase()}">${ACTION_REASONS[action.type].map(reason => `<button class="review-reason-chip" type="button" data-review-action-id="${action.id}" data-reason="${reason}">${reason}</button>`).join("")}</div>
        <button class="mini-action" id="dismiss-review-reasons" type="button">NOT NOW</button>
      </div>`;
    }

    function reviewMarkup() {
      const s = model.summary;
      const historicCounts = s.legacy?.counts || {};
      const waterCount = Number.isFinite(Number(s.waterCount)) ? Number(s.waterCount) : Number(historicCounts.water || 0);
      const fuelCount = Number.isFinite(Number(s.fuelCount)) ? Number(s.fuelCount) : Number(historicCounts.fuel || 0);
      const stretchCount = Number.isFinite(Number(s.stretchCount)) ? Number(s.stretchCount) : Number(historicCounts.stretch || 0);
      const intervalLines = s.intervals?.length ? s.intervals.map(item => `<div class="interval-line"><span>Interval ${item.number} • target ${formatTime(item.targetSeconds)}</span><b>${formatTime(item.seconds)} ${item.success ? "✓" : ""}</b></div>`).join("") : `<div class="interval-line"><span>No completed intervals</span><b>—</b></div>`;
      const cameraReview = s.camera?.enabled ? `<div class="camera-review"><h2>Camera comparison${s.camera.autoControlUsed ? " • Auto control" : " • Observation"}</h2>
        <p><strong>Detected Aero:</strong> ${formatTime(s.camera.detectedAeroSeconds)} (${s.camera.detectedAeroPercent}% of classifiable camera time)</p>
        <p><strong>Camera/timer agreement:</strong> ${s.camera.agreementPercent}% • <strong>Coverage:</strong> ${s.camera.coveragePercent}%</p>
        <p><strong>Uncertain:</strong> ${formatTime(s.camera.uncertainSeconds)} • <strong>Longest detected Aero:</strong> ${formatTime(s.camera.longestAeroSeconds)}</p>
        ${s.camera.autoControlUsed ? `<p><strong>Automatic changes:</strong> ${s.camera.autoPauseCount} pauses • ${s.camera.autoResumeCount} resumes • ${s.camera.manualOverrideCount} manual overrides</p>` : ""}
        <p>Calibration quality ${s.camera.calibrationQuality}%.</p></div>` : "";
      const trainerReview = s.trainer?.enabled ? `<div class="camera-review"><h2>Smart trainer • ${s.trainer.deviceName || "Tacx Bushido Smart"}</h2>
        <p><strong>Stops:</strong> ${s.trainer.stopCount || 0} • <strong>Total stopped:</strong> ${formatTime((s.trainer.stoppedMs || 0) / 1000)} • <strong>Longest:</strong> ${formatTime((s.trainer.longestStopMs || 0) / 1000)}</p>
        <p><strong>Average power:</strong> ${Number.isFinite(s.trainer.averageWatts) ? `${Math.round(s.trainer.averageWatts)} W` : "Not available"} • <strong>Average cadence:</strong> ${Number.isFinite(s.trainer.averageCadence) ? `${Math.round(s.trainer.averageCadence)} RPM` : "Not available"}</p>
        <p>A stop is counted after three seconds without a completed pedal revolution.</p></div>` : "";
      const observations = s.coachingObservations || [];
      const coaching = observations.length
        ? `<div class="coaching-box"><h2>Coaching summary • ${s.mode || "fixed"} mode</h2>${observations.map(text => `<p>${text}</p>`).join("")}<p>These are patterns in recorded data, not medical advice or proof of cause.</p></div>`
        : `<div class="coaching-box"><h2>Learning status</h2><p>More completed actions and comparable rides are needed before personalised observations can be supported.</p></div>`;
      return `<section class="screen review"><h1>RIDE REVIEW</h1><p class="review-date">${new Date(s.startedIso).toLocaleString()} • ${(s.mode || "fixed").toUpperCase()} MODE</p>
        <div class="review-grid">
          <div class="review-card"><strong>${formatTime(s.rideSeconds)}</strong><span>Total ride</span></div>
          <div class="review-card"><strong>${formatTime(s.aeroSeconds)}</strong><span>Total Aero</span></div>
          <div class="review-card"><strong>${s.aeroPercent}%</strong><span>Ride in Aero</span></div>
          <div class="review-card"><strong>${formatTime(s.bestIntervalSeconds)}</strong><span>Best interval</span></div>
          <div class="review-card"><strong>${s.completedIntervals}</strong><span>Intervals hit</span></div>
          <div class="review-card"><strong>${waterCount} / ${fuelCount} / ${stretchCount}</strong><span>Water / Fuel / Stretch</span></div>
        </div>
        ${model.historySaveError ? `<div class="coaching-box"><p>${model.historySaveError}</p></div>` : ""}${coaching}${reviewReasonEditorMarkup(s)}
        ${reviewActionSection(s, "fuel")}${reviewActionSection(s, "water")}${reviewActionSection(s, "stretch")}
        ${trainerReview}${cameraReview}
        <div class="interval-list"><h2>Aero intervals</h2>${intervalLines}</div>
        <div class="setup-actions"><button class="action secondary" id="view-history" type="button">VIEW RIDE HISTORY</button><button class="action" id="new-ride" type="button">START ANOTHER RIDE</button></div>
      </section>`;
    }

    function historyMarkup() {
      const history = loadHistory();
      return `<section class="screen review"><h1>RIDE HISTORY</h1><p class="review-date">Stored locally on this browser</p>
        <div class="interval-list"><h2>Recent rides</h2>${history.length ? history.map((ride, index) => `<button class="interval-line history-ride" type="button" data-history-index="${index}" style="width:100%;background:none;border-right:0;border-left:0;border-bottom:0;cursor:pointer"><span>${new Date(ride.startedIso).toLocaleDateString()} • ${formatTime(ride.rideSeconds)} • ${(ride.mode || "fixed").toUpperCase()}</span><b>${Math.round(ride.aeroPercent || 0)}% Aero</b></button>`).join("") : '<div class="interval-line"><span>No saved rides</span><b>—</b></div>'}</div>
        <div class="setup-actions"><button class="action secondary" id="history-back" type="button">BACK TO SETUP</button></div>
      </section>`;
    }

    function screenMarkup() {
      if (model.state === "setup") return setupMarkup();
      if (model.state === "camera-setup") return cameraSetupMarkup();
      if (model.state === "aero") return aeroMarkup();
      if (model.state === "paused") return pausedMarkup();
      if (model.state === "ride-paused") return rideSessionPausedMarkup();
      if (model.state === "action") return actionMarkup();
      if (model.state === "history") return historyMarkup();
      return reviewMarkup();
    }

    function render() {
      document.body.classList.toggle("camera-preview", model.state === "camera-setup" && model.cameraStep !== "permission");
      const root = activeRoot();
      if (!root) return;
      root.innerHTML = screenMarkup();
      bindControls(activeDocument());
      if (model.state === "setup") updateModeUi(activeDocument());
    }

    function bindControls(doc) {
      bindDocumentShortcuts(doc);
      doc.getElementById("start-ride")?.addEventListener("click", event => { event.stopPropagation(); startRide(doc); });
      doc.getElementById("pop-out")?.addEventListener("click", async event => { event.stopPropagation(); await openPictureInPicture(doc); });
      doc.getElementById("pip-ride")?.addEventListener("click", async event => { event.stopPropagation(); await openPictureInPicture(doc); });
      doc.querySelector(".screen-advance-control")?.addEventListener("click", event => { event.stopPropagation(); advance("manual"); });
      doc.getElementById("aero-hero-action")?.addEventListener("click", event => { event.stopPropagation(); advance("manual"); });
      doc.getElementById("pause-ride")?.addEventListener("click", event => { event.stopPropagation(); pauseRide(); });
      doc.getElementById("resume-ride")?.addEventListener("click", event => { event.stopPropagation(); resumeRide(); });
      doc.getElementById("camera-auto-toggle")?.addEventListener("click", event => { event.stopPropagation(); toggleCameraAutoControl(); });
      doc.getElementById("connect-trainer")?.addEventListener("click", async event => { event.stopPropagation(); await connectTrainer(); });
      doc.getElementById("disconnect-trainer")?.addEventListener("click", event => { event.stopPropagation(); disconnectTrainer(); });
      doc.querySelectorAll("[data-camera-learning-answer]").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        handleCameraLearningResponse(button.dataset.cameraLearningAnswer === "yes");
      }));
      doc.getElementById("camera-enabled")?.addEventListener("change", event => { event.stopPropagation(); updateCameraSetupUi(doc); });
      doc.getElementById("finish-ride")?.addEventListener("click", event => { event.stopPropagation(); requestRideExit("review"); });
      doc.getElementById("ride-main-menu")?.addEventListener("click", event => { event.stopPropagation(); requestRideExit("menu"); });
      doc.getElementById("new-ride")?.addEventListener("click", event => { event.stopPropagation(); resetToSetup(); });
      doc.getElementById("view-history")?.addEventListener("click", event => { event.stopPropagation(); model.state = "history"; render(); });
      doc.getElementById("history-back")?.addEventListener("click", event => { event.stopPropagation(); model.state = "setup"; render(); });
      doc.querySelectorAll(".history-ride").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        const ride = loadHistory()[Number(button.dataset.historyIndex)];
        if (ride) { model.summary = ride; model.historySaveError = ""; model.reviewReasonEditorDismissed = false; model.state = "review"; render(); }
      }));
      doc.getElementById("enable-camera")?.addEventListener("click", event => { event.stopPropagation(); prepareCamera(); });
      doc.getElementById("retry-camera")?.addEventListener("click", event => { event.stopPropagation(); retryCamera(); });
      doc.getElementById("capture-upright")?.addEventListener("click", event => { event.stopPropagation(); captureCalibration("upright"); });
      doc.getElementById("capture-aero")?.addEventListener("click", event => { event.stopPropagation(); captureCalibration("aero"); });
      doc.getElementById("begin-calibrated-ride")?.addEventListener("click", event => { event.stopPropagation(); beginRide(model.pendingRideValues, true); });
      doc.getElementById("skip-camera")?.addEventListener("click", event => { event.stopPropagation(); skipCamera(); });
      doc.querySelectorAll("[name='ride-mode']").forEach(input => input.addEventListener("change", event => { event.stopPropagation(); model.rideMode = input.value; updateModeUi(doc); }));
      doc.querySelectorAll("[name='dashboard-style']").forEach(input => input.addEventListener("change", event => { event.stopPropagation(); updateDashboardUi(doc, input.value); }));
      doc.getElementById("observation-reminders")?.addEventListener("change", () => updateModeUi(doc));
      doc.getElementById("ride-minutes")?.addEventListener("change", () => updateModeUi(doc));
      for (const [type, inputId] of Object.entries({ water: "water-every", fuel: "fuel-every", stretch: "stretch-every" })) {
        doc.getElementById(inputId)?.addEventListener("change", () => {
          const settings = loadSettings();
          const seconds = Number(doc.getElementById(inputId)?.value) * 60;
          if (settings.acceptedIntervals[type]?.seconds !== seconds) delete settings.acceptedIntervals[type];
          model.ignoredRecommendations[type] = null;
          saveSettings(settings);
          updateModeUi(doc);
        });
      }
      bindLearningControls(doc);
      doc.querySelectorAll("[data-log-action]").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        const type = button.dataset.logAction;
        const result = recordCompletedAction(type, { source: "manual", recordedVia: "manual-button" });
        if (!result.duplicate && model.state === "action" && model.currentAction === type) continueAfterActionResolution();
      }));
      doc.querySelectorAll(".review-reason-chip").forEach(button => button.addEventListener("click", event => { event.stopPropagation(); setReviewActionReason(button.dataset.reviewActionId, button.dataset.reason); }));
      doc.getElementById("dismiss-review-reasons")?.addEventListener("click", event => { event.stopPropagation(); model.reviewReasonEditorDismissed = true; render(); });
      doc.querySelectorAll(".reminder-done").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        const reminder = model.reminders.find(item => item.id === button.dataset.reminderId);
        if (reminder) recordCompletedAction(reminder.type, { source: "reminder", recordedVia: "reminder-done", reminderId: reminder.id });
      }));
      doc.querySelectorAll(".reminder-snooze").forEach(button => button.addEventListener("click", event => { event.stopPropagation(); snoozeReminder(button.dataset.reminderId); }));
      doc.querySelectorAll(".reminder-skip").forEach(button => button.addEventListener("click", event => { event.stopPropagation(); skipReminder(button.dataset.reminderId); }));
      doc.querySelector(".action-done")?.addEventListener("click", event => { event.stopPropagation(); completeActionAndContinue(); });
      doc.querySelector(".action-snooze")?.addEventListener("click", event => { event.stopPropagation(); if (model.currentReminderId) snoozeReminder(model.currentReminderId); });
      doc.querySelector(".action-skip")?.addEventListener("click", event => { event.stopPropagation(); if (model.currentReminderId) skipReminder(model.currentReminderId); });
    }

    function bindDocumentShortcuts(doc) {
      if (shortcutDocuments.has(doc)) return;
      shortcutDocuments.add(doc);
      doc.addEventListener("keydown", event => {
        const target = event.target;
        if (target?.closest?.("input, textarea, select, button")) return;
        if (!["aero", "paused", "ride-paused", "action"].includes(model.state)) return;
        if (event.key.toLowerCase() === "p") {
          event.preventDefault();
          if (model.state === "ride-paused") resumeRide(); else pauseRide();
          return;
        }
        if (model.state === "ride-paused") {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); resumeRide(); }
          return;
        }
        const shortcutType = ({ "1": "water", "2": "fuel", "3": "stretch" })[event.key];
        if (shortcutType) {
          event.preventDefault();
          const result = recordCompletedAction(shortcutType, { source: "manual", recordedVia: "keyboard" });
          if (!result.duplicate && model.state === "action" && model.currentAction === shortcutType) continueAfterActionResolution();
          return;
        }
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault(); advance("manual");
        }
      });
    }

    function bindLearningControls(doc) {
      doc.querySelectorAll(".use-recommendation").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        const input = doc.getElementById(button.dataset.input);
        if (input) input.value = Math.round(Number(button.dataset.seconds) / 60);
        const settings = loadSettings();
        settings.acceptedIntervals[button.dataset.type] = { seconds: Number(button.dataset.seconds), source: "history", ridesUsed: Number(button.dataset.rides), acceptedAtIso: new Date().toISOString() };
        model.ignoredRecommendations[button.dataset.type] = null;
        saveSettings(settings);
        updateModeUi(doc);
      }));
      doc.querySelectorAll(".ignore-recommendation").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        model.ignoredRecommendations[button.dataset.type] = Number(button.dataset.seconds);
        updateModeUi(doc);
      }));
      doc.querySelectorAll(".show-recommendation").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        model.ignoredRecommendations[button.dataset.type] = null;
        updateModeUi(doc);
      }));
      doc.querySelectorAll(".edit-recommendation").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        const input = doc.getElementById(button.dataset.input);
        input?.focus();
        input?.select();
        announce(`Edit the ${ACTION_LABELS[button.dataset.type].toLowerCase()} interval, then continue when ready.`);
      }));
      doc.querySelectorAll(".reset-learning").forEach(button => button.addEventListener("click", event => { event.stopPropagation(); model.learningResetConfirmType = button.dataset.type; updateModeUi(doc); }));
      doc.querySelectorAll(".confirm-reset-learning").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation(); resetLearningFor(button.dataset.type); model.learningResetConfirmType = null; updateModeUi(doc);
      }));
      doc.querySelectorAll(".cancel-reset-learning").forEach(button => button.addEventListener("click", event => { event.stopPropagation(); model.learningResetConfirmType = null; updateModeUi(doc); }));
    }

    function updateCameraSetupUi(doc) {
      const enabled = Boolean(doc.getElementById("camera-enabled")?.checked);
      const setup = doc.querySelector(".setup");
      if (setup) setup.dataset.cameraEnabled = String(enabled);
      const options = doc.getElementById("camera-options");
      if (options) options.hidden = !enabled;
      const auto = doc.getElementById("camera-auto");
      if (auto) auto.disabled = !enabled;
    }

    function updateModeUi(doc) {
      const mode = doc.querySelector("[name='ride-mode']:checked")?.value || model.rideMode || "fixed";
      model.rideMode = mode;
      const setup = doc.querySelector(".setup");
      if (setup) setup.dataset.mode = mode;
      const descriptions = {
        fixed: "Use your editable fixed schedules. Manual actions are still recorded for review.",
        observation: "Learn your natural habits. Manual actions are recorded; fixed reminders are optional.",
        coach: "Compare recent similar rides and choose whether to use any history-based suggestion."
      };
      const description = doc.getElementById("mode-description");
      if (description) description.textContent = descriptions[mode];
      const settings = loadSettings();
      settings.preferredMode = mode;
      settings.observationReminders = Boolean(doc.getElementById("observation-reminders")?.checked);
      saveSettings(settings);
      const cards = doc.getElementById("learning-cards");
      if (cards) {
        const plannedSec = Math.max(60, Number(doc.getElementById("ride-minutes")?.value || 90) * 60);
        cards.innerHTML = learningCardsMarkup(loadHistory(), settings, plannedSec, mode);
      }
      const management = doc.getElementById("learning-management");
      if (management) management.innerHTML = learningManagementMarkup();
      bindLearningControls(doc);
      updateCameraSetupUi(doc);
    }
