    function updateDashboardUi(doc, style) {
      const selected = ["practical", "immersive"].includes(style) ? style : "practical";
      model.dashboardStyle = selected;
      const settings = loadSettings();
      settings.dashboardStyle = selected;
      saveSettings(settings);
      const description = doc.getElementById("dashboard-description");
      if (description) description.textContent = selected === "immersive"
        ? "Rider backdrop with floating translucent controls. Compact PiP remains distraction-free."
        : "Low-glare three-zone riding screen with the strongest timer contrast.";
    }

    function updateCameraUi(doc) {
      if (!doc) return;
      const snapshot = model.cameraSnapshot;
      const badge = doc.getElementById("camera-badge");
      if (badge) {
        const state = snapshot.stableState || "uncertain";
        badge.className = `camera-badge ${state}`;
        badge.textContent = `CAMERA ${state.toUpperCase()} ${Math.round((snapshot.confidence || 0) * 100)}%`;
        badge.title = snapshot.reason || "Passive camera observation";
      }
      const countdown = doc.getElementById("camera-countdown");
      if (countdown && snapshot.capture) countdown.textContent = Math.max(0, Math.ceil(snapshot.capture.remaining));
    }

    function maybeOfferCameraLearningPrompt(previousStableState, snapshot) {
      const timestamp = now();
      if (model.cameraLearningPrompt && timestamp >= model.cameraLearningPrompt.expiresAt) model.cameraLearningPrompt = null;
      const detectedState = snapshot.stableState;
      if (model.cameraLearningPrompt && detectedState !== model.cameraLearningPrompt.detectedState) model.cameraLearningPrompt = null;
      if (model.cameraLearningApplying || !model.cameraEnabled || !["aero", "paused"].includes(model.state)) return false;
      if (!["aero", "upright"].includes(detectedState) || detectedState === previousStableState) return false;
      if (model.intervalComplete || model.rideTargetReached || getDueActions().length || model.cameraLearningPrompt) return false;
      if (timestamp - model.cameraLearningLastAsked[detectedState] < CAMERA_LEARNING_COOLDOWN_MS) return false;
      const candidate = cameraObserver.stageLearningCandidate(timestamp);
      if (candidate.count < 5) return false;
      model.cameraLearningLastAsked[detectedState] = timestamp;
      model.cameraLearningPrompt = { detectedState, expiresAt: timestamp + CAMERA_LEARNING_PROMPT_MS };
      model.events.push({ type: "camera-learning-prompt", detectedState, at: rideMs() / 1000 });
      return true;
    }

    function handleCameraLearningResponse(isCorrect) {
      const prompt = model.cameraLearningPrompt;
      if (!prompt || now() >= prompt.expiresAt) { model.cameraLearningPrompt = null; render(); return; }
      const learnedState = isCorrect ? prompt.detectedState : prompt.detectedState === "aero" ? "upright" : "aero";
      model.cameraLearningPrompt = null;
      model.cameraLearningApplying = true;
      model.cameraControlHoldUntil = now() + CAMERA_MANUAL_HOLD_MS;
      const result = cameraObserver.applyLearningFeedback(learnedState);
      model.cameraLearningApplying = false;
      model.cameraSnapshot = cameraObserver.getSnapshot();
      model.actionFeedback = {
        text: result.learned ? `Camera learned ${learnedState.toUpperCase()}` : "Hold the position a little longer next time",
        expiresAt: now() + 3000
      };
      model.events.push({
        type: "camera-learning-feedback",
        detectedState: prompt.detectedState,
        confirmedState: learnedState,
        accepted: isCorrect,
        sampleCount: result.count,
        at: rideMs() / 1000
      });
      if (result.learned && model.cameraAutoControl && !getDueActions().length && !model.intervalComplete && !model.rideTargetReached) {
        if (learnedState === "upright" && model.state === "aero") {
          pauseAero();
          model.state = "paused";
          model.cameraPauseReason = "You confirmed Upright.";
        } else if (learnedState === "aero" && model.state === "paused") {
          model.cameraPauseReason = "";
          startOrResumeAero("camera");
          announce("Camera learned Aero and resumed the Aero clock.");
          return;
        }
      }
      announce(result.learned ? `Camera learned ${learnedState}.` : "Camera needs a steadier sample to learn.");
      render();
    }

    function handleCameraControl(snapshot) {
      const action = decideCameraTimerAction({
        enabled: model.cameraEnabled && model.cameraAutoControl,
        stableState: snapshot.stableState,
        rideState: model.state,
        intervalComplete: model.intervalComplete,
        rideTargetReached: model.rideTargetReached,
        manualHoldActive: now() < model.cameraControlHoldUntil
      });
      if (action === "pause") {
        pauseAero();
        model.state = "paused";
        model.cameraPauseReason = "Camera detected upright.";
        model.events.push({ type: "camera-auto-pause", at: rideMs() / 1000, interval: model.intervalNumber });
        render();
      } else if (action === "resume") {
        model.cameraPauseReason = "";
        startOrResumeAero("camera");
      }
    }

    function toggleCameraAutoControl() {
      model.cameraAutoControl = !model.cameraAutoControl;
      if (model.cameraAutoControl) {
        model.cameraAutoEverEnabled = true;
        model.cameraControlHoldUntil = now() + 1000;
        model.events.push({ type: "camera-auto-enabled", at: rideMs() / 1000 });
      } else {
        model.cameraControlHoldUntil = 0;
        model.events.push({ type: "camera-auto-disabled", at: rideMs() / 1000 });
      }
      render();
    }

    function readPositive(doc, id, allowZero = false) {
      const input = doc.getElementById(id);
      const value = Number(input?.value);
      if (!Number.isFinite(value) || (allowZero ? value < 0 : value <= 0)) {
        input?.focus(); input?.select(); throw new Error("invalid input");
      }
      return value;
    }

    async function connectTrainer() {
      try {
        await trainer.connect();
      } catch (error) {
        model.trainerStatus = "error";
        model.trainerMessage = error?.message || "Trainer could not connect. Keep pedalling and try again.";
        render();
        announce(model.trainerMessage);
      }
    }

    function disconnectTrainer() {
      trainer.disconnect();
      model.trainerStatus = "disconnected";
      model.trainerDeviceName = "";
      model.trainerMessage = "Trainer disconnected. Start pedalling before reconnecting.";
      render();
      announce("Trainer disconnected.");
    }

    function startRide(doc) {
      let values;
      try {
        values = {
          ride: readPositive(doc, "ride-minutes") * 60,
          aeroGoal: readPositive(doc, "aero-goal") * 60,
          interval: readPositive(doc, "interval-minutes") * 60,
          progression: readPositive(doc, "progression-minutes", true) * 60,
          waterEvery: readPositive(doc, "water-every") * 60,
          fuelEvery: readPositive(doc, "fuel-every") * 60,
          stretchEvery: readPositive(doc, "stretch-every") * 60,
          fuelDuration: readPositive(doc, "fuel-seconds")
        };
      } catch (_) { return; }
      values.mode = doc.querySelector("[name='ride-mode']:checked")?.value || "fixed";
      values.dashboardStyle = doc.querySelector("[name='dashboard-style']:checked")?.value || "practical";
      values.trainerEnabled = trainer.connected;
      values.remindersEnabled = values.mode !== "observation" || Boolean(doc.getElementById("observation-reminders")?.checked);
      const savedSettings = loadSettings();
      const selectedIntervals = { water: values.waterEvery, fuel: values.fuelEvery, stretch: values.stretchEvery };
      values.intervalSources = Object.fromEntries(ACTION_TYPES.map(type => [type,
        savedSettings.acceptedIntervals[type]?.source === "history" && savedSettings.acceptedIntervals[type].seconds === selectedIntervals[type]
          ? "history-based" : values.mode === "fixed" ? "fixed" : "athlete-entered"
      ]));
      values.acceptedRecommendations = Object.fromEntries(ACTION_TYPES.flatMap(type => {
        const accepted = savedSettings.acceptedIntervals[type];
        return accepted?.source === "history" && accepted.seconds === selectedIntervals[type] ? [[type, structuredClone(accepted)]] : [];
      }));
      savedSettings.preferredMode = values.mode;
      savedSettings.dashboardStyle = values.dashboardStyle;
      savedSettings.observationReminders = Boolean(doc.getElementById("observation-reminders")?.checked);
      saveSettings(savedSettings);
      const cameraEnabled = Boolean(doc.getElementById("camera-enabled")?.checked);
      values.cameraAuto = cameraEnabled && Boolean(doc.getElementById("camera-auto")?.checked);
      if (cameraEnabled) {
        unlockAudio();
        model.pendingRideValues = values;
        model.cameraEnabled = true;
        model.cameraStep = "permission";
        model.cameraError = "";
        model.state = "camera-setup";
        if (model.pipWindow && !model.pipWindow.closed) {
          const pip = model.pipWindow;
          model.pipWindow = null;
          pip.close();
        }
        render();
        return;
      }
      beginRide(values, false);
    }

    function beginRide(values, cameraEnabled) {
      unlockAudio();
      const startedAt = now();
      const autoControl = cameraEnabled && Boolean(values.cameraAuto);
      Object.assign(model, {
        state: autoControl ? "paused" : "aero", rideStartedAt: startedAt, rideStartedIso: new Date().toISOString(),
        ridePausedAt: 0, accumulatedRidePauseMs: 0, ridePausedFromState: null, pausedActionRemainingMs: 0, rideExitConfirmation: null,
        plannedRideSec: values.ride, aeroGoalSec: values.aeroGoal, baseIntervalSec: values.interval,
        progressionSec: values.progression, currentIntervalTargetSec: values.interval,
        fuelEverySec: values.fuelEvery, waterEverySec: values.waterEvery, stretchEverySec: values.stretchEvery,
        fuelDurationSec: values.fuelDuration,
        nextDue: { fuel: values.fuelEvery, water: values.waterEvery, stretch: values.stretchEvery },
        accumulatedAeroMs: 0, intervalAccumulatedMs: 0, aeroSegmentStartedAt: autoControl ? 0 : startedAt,
        intervalNumber: 1, intervalComplete: false, intervalRecorded: false, bestIntervalMs: 0,
        personalBestSec: getPersonalBest(loadHistory()),
        intervals: [], events: [{ type: "ride-start", at: 0 }, { type: "ride-phase-start", phase: 1, name: RIDE_PHASES[0].name, at: 0 }, ...(autoControl ? [{ type: "camera-auto-enabled", at: 0 }] : [])], notified: new Set(),
        rideMode: values.mode, dashboardStyle: values.dashboardStyle, remindersEnabled: values.remindersEnabled, reminders: [], completedActions: [],
        actionLocks: { water: 0, fuel: 0, stretch: 0 }, actionFeedback: null, reviewReasonEditorDismissed: false, currentReminderId: null,
        acceptedRecommendations: values.acceptedRecommendations, intervalSources: values.intervalSources, historySaveError: "",
        nutritionIndex: 0, currentFuel: nutritionPlan[0], currentMobility: randomMobility(),
         rideTargetReached: false, currentPhaseIndex: 0, summary: null, cameraEnabled,
         cameraAutoControl: autoControl, cameraAutoEverEnabled: autoControl,
         cameraControlHoldUntil: 0, cameraPauseReason: autoControl ? "Waiting for a stable Aero position." : "",
         cameraLearningPrompt: null, cameraLearningLastAsked: { aero: -Infinity, upright: -Infinity }, cameraLearningApplying: false,
         trainerRideEnabled: Boolean(values.trainerEnabled),
         trainerSnapshot: { watts: null, cadence: null, stopCount: 0, stoppedMs: 0, longestStopMs: 0, averageWatts: null, averageCadence: null, isStopped: false }
      });
      pedallingTracker.reset(startedAt);
      document.body.classList.remove("camera-preview");
      if (cameraEnabled) cameraObserver.beginSession();
      render();
    }

    async function prepareCamera() {
      model.cameraStep = "loading";
      model.cameraError = "";
      render();
      try {
        await cameraObserver.start();
        model.cameraStep = "upright";
      } catch (error) {
        model.cameraStep = "error";
        model.cameraError = error?.message || "Camera could not start.";
      }
      render();
    }

    async function captureCalibration(label) {
      model.cameraError = "";
      try {
        const promise = cameraObserver.capturePose(label, 4);
        render();
        await promise;
        if (label === "upright") {
          model.cameraStep = "aero";
        } else {
          cameraObserver.finalizeCalibration();
          model.cameraStep = "ready";
        }
      } catch (error) {
        model.cameraStep = "error";
        model.cameraError = error?.message || "Calibration failed.";
      }
      render();
    }

    async function retryCamera() {
      await cameraObserver.stop();
      model.cameraSnapshot = cameraObserver.getSnapshot();
      model.cameraStep = "permission";
      model.cameraError = "";
      render();
    }

    async function skipCamera() {
      await cameraObserver.stop();
      model.cameraEnabled = false;
      beginRide(model.pendingRideValues, false);
    }

    function randomMobility() { return mobilityPlan[Math.floor(Math.random() * mobilityPlan.length)]; }

    function pauseAero() {
      const live = liveAeroMs();
      model.accumulatedAeroMs += live;
      model.intervalAccumulatedMs += live;
      model.aeroSegmentStartedAt = 0;
    }

    function pauseRide() {
      if (!["aero", "paused", "action"].includes(model.state) || model.ridePausedAt) return;
      const pausedFrom = model.state;
      if (pausedFrom === "aero") pauseAero();
      model.pausedActionRemainingMs = pausedFrom === "action" && model.currentAction === "fuel" && !model.actionFinished
        ? Math.max(0, model.actionEndsAt - now())
        : 0;
      model.ridePausedFromState = pausedFrom;
      model.rideExitConfirmation = null;
      model.ridePausedAt = now();
      if (model.trainerRideEnabled) model.trainerSnapshot = pedallingTracker.pause(model.ridePausedAt);
      model.state = "ride-paused";
      model.events.push({ type: "ride-pause", at: rideMs() / 1000, from: pausedFrom });
      announce("Ride paused. All ride timers are stopped.");
      render();
    }

    function resumeRide() {
      if (model.state !== "ride-paused" || !model.ridePausedAt) return;
      const resumedAt = now();
      const pausedDuration = Math.max(0, resumedAt - model.ridePausedAt);
      let resumeState = model.ridePausedFromState || "paused";
      model.accumulatedRidePauseMs += pausedDuration;
      model.ridePausedAt = 0;
      if (resumeState === "aero" && model.cameraAutoControl && model.cameraSnapshot.stableState !== "aero") {
        resumeState = "paused";
        model.cameraPauseReason = "Ride resumed; waiting for Camera Aero.";
      }
      model.state = resumeState;
      if (resumeState === "aero" && !model.intervalComplete && !model.rideTargetReached) model.aeroSegmentStartedAt = resumedAt;
      if (resumeState === "action" && model.currentAction === "fuel" && !model.actionFinished) {
        model.actionEndsAt = resumedAt + model.pausedActionRemainingMs;
      }
      model.events.push({ type: "ride-resume", at: rideMs() / 1000, to: resumeState, pausedSeconds: pausedDuration / 1000 });
      model.ridePausedFromState = null;
      model.pausedActionRemainingMs = 0;
      model.rideExitConfirmation = null;
      announce("Ride resumed.");
      render();
    }

    function completeInterval() {
      if (model.intervalComplete) return;
      pauseAero();
      model.intervalComplete = true;
      model.bestIntervalMs = Math.max(model.bestIntervalMs, model.intervalAccumulatedMs);
      if (!model.intervalRecorded) {
        model.intervals.push({ number: model.intervalNumber, targetSeconds: model.currentIntervalTargetSec, seconds: model.intervalAccumulatedMs / 1000, success: true });
        model.events.push({ type: "interval-complete", at: rideMs() / 1000, interval: model.intervalNumber });
        model.intervalRecorded = true;
      }
      beep(); render();
    }

    function startOrResumeAero(source = "manual") {
      if (model.intervalComplete) {
        model.intervalNumber += 1;
        model.currentIntervalTargetSec = model.baseIntervalSec + (model.intervalNumber - 1) * model.progressionSec;
        model.intervalAccumulatedMs = 0;
        model.intervalComplete = false;
        model.intervalRecorded = false;
      }
      model.state = "aero";
      model.aeroSegmentStartedAt = now();
      model.events.push({ type: source === "camera" ? "camera-auto-resume" : "aero-resume", at: rideMs() / 1000, interval: model.intervalNumber });
      render();
    }

    function announce(message) {
      const status = activeDocument().getElementById("hud-status");
      if (status) status.textContent = message;
    }

    function findOpenReminder(type, reminderId = null, elapsed = rideMs() / 1000) {
      return findReminderForAction(model.reminders, type, elapsed, reminderId);
    }

    function createEarlyPlannedReminder(type, elapsed) {
      if (!model.remindersEnabled) return null;
      const cadence = type === "water" ? model.waterEverySec : type === "fuel" ? model.fuelEverySec : model.stretchEverySec;
      const timeToNext = model.nextDue[type] - elapsed;
      const earlyWindow = Math.min(120, cadence * .1);
      if (timeToNext < 0 || timeToNext > earlyWindow) return null;
      const reminder = createReminder({ type, dueAtSec: model.nextDue[type], intervalSec: cadence, source: model.intervalSources[type] || "fixed" });
      model.reminders.push(reminder);
      model.nextDue[type] += cadence;
      return reminder;
    }

    function recordCompletedAction(type, { source = "manual", recordedVia = "manual-button", reminderId = null } = {}) {
      const elapsed = rideMs() / 1000;
      let reminder = findOpenReminder(type, reminderId, elapsed);
      if (!reminder && source === "manual") reminder = createEarlyPlannedReminder(type, elapsed);
      const latest = [...model.completedActions].reverse().find(action => action.type === type);
      if (isDuplicateAction(model.completedActions, type, elapsed)) {
        model.actionFeedback = { text: `${ACTION_LABELS[type]} already recorded`, expiresAt: now() + 2500 };
        announce(`${ACTION_LABELS[type]} already recorded.`);
        render();
        return { action: latest, duplicate: true };
      }

      const triggeredByReminder = Boolean(reminder && reminder.dueAtSec <= elapsed);
      const actionSource = triggeredByReminder ? "reminder" : reminder ? "planned" : source;
      const posture = model.cameraEnabled ? model.cameraSnapshot.stableState || "uncertain" : model.state === "aero" ? "aero" : "upright";
      const action = createCompletedAction({
        type,
        rideElapsedSec: elapsed,
        timestampIso: new Date().toISOString(),
        source: actionSource,
        recordedVia,
        planned: Boolean(reminder),
        reminderId: reminder?.id || null,
        posture,
        rideState: model.state,
        aeroIntervalNumber: model.intervalNumber
      });
      model.completedActions.push(action);
      model.events.push({
        id: action.id,
        kind: "completed-action",
        type: `${type}-complete`,
        actionType: type,
        at: elapsed,
        timestampIso: action.timestampIso,
        source: action.source,
        recordedVia,
        planned: action.planned,
        reminderId: action.reminderId,
        reason: null,
        cameraState: model.cameraEnabled ? model.cameraSnapshot.stableState : "off",
        timerState: model.state,
        interval: model.intervalNumber
      });
      if (reminder) {
        completeReminderRecord(reminder, action, elapsed);
      }
      if (type === "fuel") { model.nutritionIndex += 1; model.currentFuel = nutritionPlan[model.nutritionIndex % nutritionPlan.length]; }
      if (type === "stretch") model.currentMobility = randomMobility();
      model.actionLocks[type] = now() + 4000;
      model.actionFeedback = { text: `${ACTION_LABELS[type]} saved`, expiresAt: now() + 4000 };
      announce(`${ACTION_LABELS[type]} saved.`);
      render();
      return { action, duplicate: false };
    }

    function setReviewActionReason(actionId, reason) {
      const summary = model.summary;
      if (!summary) return;
      const action = updateCompletedActionReason(summary.actions || [], actionId, reason);
      if (!action) return;
      const event = (summary.events || []).find(item => item.id === actionId);
      if (event) { event.reason = reason; event.planned = action.planned; }
      summary.actionStats = Object.fromEntries(ACTION_TYPES.map(type => [type, calculateActionStats(summary.actions || [], type, summary.rideSeconds)]));
      summary.coachingObservations = buildCoachingObservations(summary, loadHistory());
      try {
        saveRide(summary);
        model.historySaveError = "";
      } catch (error) {
        model.historySaveError = "Ride context could not be saved locally. Keep this screen open and try again.";
      }
      announce(`${reason} context saved for ${ACTION_LABELS[action.type].toLowerCase()}.`);
      render();
    }

    function snoozeReminder(reminderId, minutes = 5) {
      const reminder = model.reminders.find(item => item.id === reminderId && ["pending", "snoozed"].includes(item.status));
      if (!reminder) return;
      const elapsed = rideMs() / 1000;
      snoozeReminderRecord(reminder, elapsed, minutes);
      model.events.push({ type: "reminder-snoozed", reminderId, actionType: reminder.type, at: elapsed, minutes });
      model.actionFeedback = { text: `${ACTION_LABELS[reminder.type]} snoozed ${minutes} minutes`, expiresAt: now() + 3000 };
      announce(`${ACTION_LABELS[reminder.type]} reminder snoozed for ${minutes} minutes.`);
      if (model.state === "action" && model.currentReminderId === reminderId) continueAfterActionResolution(); else render();
    }

    function skipReminder(reminderId) {
      const reminder = model.reminders.find(item => item.id === reminderId && ["pending", "snoozed"].includes(item.status));
      if (!reminder) return;
      const elapsed = rideMs() / 1000;
      skipReminderRecord(reminder, elapsed);
      model.events.push({ type: "reminder-skipped", reminderId, actionType: reminder.type, at: elapsed });
      model.actionFeedback = { text: `${ACTION_LABELS[reminder.type]} reminder skipped`, expiresAt: now() + 3000 };
      announce(`${ACTION_LABELS[reminder.type]} reminder skipped.`);
      if (model.state === "action" && model.currentReminderId === reminderId) continueAfterActionResolution(); else render();
    }

    function startAction(type, scheduled = true, reminderId = null) {
      model.state = "action";
      model.currentAction = type;
      model.actionScheduled = scheduled;
      model.currentReminderId = reminderId || (scheduled ? getDueActions().find(reminder => reminder.type === type)?.id || null : null);
      model.actionFinished = false;
      model.actionEndsAt = type === "fuel" ? now() + model.fuelDurationSec * 1000 : 0;
      model.events.push({ type: `${type}-start`, at: rideMs() / 1000, scheduled, reminderId: model.currentReminderId });
      render();
    }

    function completeActionAndContinue() {
      const type = model.currentAction;
      recordCompletedAction(type, { source: model.actionScheduled ? "reminder" : "manual", recordedVia: "action-screen", reminderId: model.currentReminderId });
      continueAfterActionResolution();
    }

    function continueAfterActionResolution() {
      model.currentReminderId = null;
      const nextDue = getDueActions()[0];
      if (nextDue) startAction(nextDue.type, true, nextDue.id);
      else if (shouldWaitForAeroAfterBreak({ enabled: model.cameraAutoControl, stableState: model.cameraSnapshot.stableState })) {
        model.cameraControlHoldUntil = 0;
        model.state = "paused";
        model.aeroSegmentStartedAt = 0;
        model.cameraPauseReason = "Break complete; waiting for Camera Aero.";
        model.events.push({ type: "camera-waiting-for-aero", at: rideMs() / 1000 });
        render();
      } else {
        model.cameraControlHoldUntil = 0;
        startOrResumeAero();
      }
    }

    function advance(source = "manual") {
      unlockAudio();
      const manualTimerOverride = (model.state === "aero" && !model.intervalComplete && !model.rideTargetReached)
        || (model.state === "paused" && !getDueActions().length);
      if (source === "manual" && model.cameraAutoControl && manualTimerOverride) {
        model.cameraControlHoldUntil = now() + CAMERA_MANUAL_HOLD_MS;
        model.events.push({ type: "camera-manual-override", at: rideMs() / 1000, from: model.state });
      }
      if (model.state === "aero") {
        pauseAero();
        if (model.rideTargetReached) { finishRide(); return; }
        const due = getDueActions()[0];
        if (due) startAction(due.type, true, due.id);
        else if (model.intervalComplete) startAction("stretch", false);
        else { model.state = "paused"; model.events.push({ type: "aero-pause", at: rideMs() / 1000 }); render(); }
      } else if (model.state === "paused") {
        const due = getDueActions()[0];
        if (due) startAction(due.type, true, due.id); else startOrResumeAero();
      } else if (model.state === "action") completeActionAndContinue();
    }

    function finishRide({ returnToSetup = false } = {}) {
      if (model.state === "aero") pauseAero();
      const rideSeconds = rideMs() / 1000;
      const endedIso = new Date().toISOString();
      if (model.intervalAccumulatedMs > 0 && !model.intervalRecorded) {
        model.intervals.push({ number: model.intervalNumber, targetSeconds: model.currentIntervalTargetSec, seconds: model.intervalAccumulatedMs / 1000, success: false });
      }
      model.reminders.forEach(reminder => { if (["pending", "snoozed"].includes(reminder.status)) reminder.status = "missed"; });
      const count = type => model.completedActions.filter(action => action.type === type).length;
      const actionStats = Object.fromEntries(ACTION_TYPES.map(type => [type, calculateActionStats(model.completedActions, type, rideSeconds)]));
      const reminderStats = Object.fromEntries(ACTION_TYPES.map(type => [type, calculateReminderStats(model.reminders, type)]));
      const cameraSummary = model.cameraEnabled ? cameraObserver.endSession(rideSeconds) : { enabled: false };
      const trainerSummary = model.trainerRideEnabled ? {
        enabled: true,
        deviceName: model.trainerDeviceName || "Tacx Bushido Smart",
        ...pedallingTracker.snapshot(now()),
        connectedAtFinish: trainer.connected
      } : { enabled: false };
      if (cameraSummary.enabled) Object.assign(cameraSummary, {
        autoControlUsed: model.cameraAutoEverEnabled,
        autoPauseCount: model.events.filter(event => event.type === "camera-auto-pause").length,
        autoResumeCount: model.events.filter(event => event.type === "camera-auto-resume").length,
        manualOverrideCount: model.events.filter(event => event.type === "camera-manual-override").length
      });
      model.summary = {
        schemaVersion: RIDE_SCHEMA_VERSION,
        id: `ride-${model.rideStartedIso}`,
        startedIso: model.rideStartedIso, endedIso, rideSeconds, plannedRideSec: model.plannedRideSec, mode: model.rideMode,
        settings: {
          plannedRideSec: model.plannedRideSec,
          aeroGoalSec: model.aeroGoalSec,
          baseIntervalSec: model.baseIntervalSec,
          progressionSec: model.progressionSec,
          fuelDurationSec: model.fuelDurationSec,
          remindersEnabled: model.remindersEnabled,
          reminderIntervals: { water: model.waterEverySec, fuel: model.fuelEverySec, stretch: model.stretchEverySec },
          intervalSources: { ...model.intervalSources },
          dashboardStyle: model.dashboardStyle || "practical"
        },
        acceptedRecommendations: structuredClone(model.acceptedRecommendations),
        actions: structuredClone(model.completedActions),
        reminders: structuredClone(model.reminders),
        events: structuredClone(model.events),
        actionStats,
        reminderStats,
        aeroSeconds: model.accumulatedAeroMs / 1000,
        aeroPercent: rideSeconds ? Math.round(model.accumulatedAeroMs / 10 / rideSeconds) : 0,
        bestIntervalSeconds: model.bestIntervalMs / 1000, completedIntervals: model.intervals.filter(item => item.success).length,
        waterCount: count("water"), fuelCount: count("fuel"), stretchCount: count("stretch"),
        intervals: model.intervals.map(item => ({ ...item })), camera: cameraSummary, trainer: trainerSummary
      };
      model.summary.coachingObservations = buildCoachingObservations(model.summary, loadHistory());
      model.reviewReasonEditorDismissed = false;
      let rideSaved = true;
      try {
        saveRide(model.summary);
      } catch (error) {
        rideSaved = false;
        model.historySaveError = "Ride review could not be saved locally. Keep this screen open and try again.";
      }
      model.state = "review";
      document.body.classList.remove("camera-preview");
      if (model.cameraEnabled) cameraObserver.stop();
      closePictureInPicture();
      if (returnToSetup && rideSaved) {
        resetToSetup();
        announce("Ride saved. Main menu ready.");
        return;
      }
      render();
      announce(rideSaved ? "Ride saved. Review ready." : model.historySaveError);
    }

    function requestRideExit(destination) {
      if (model.state !== "ride-paused") return;
      if (model.rideExitConfirmation !== destination) {
        model.rideExitConfirmation = destination;
        announce(destination === "review" ? "Tap Confirm End to finish the ride." : "Tap Confirm Menu to save and return to the main menu.");
        render();
        return;
      }
      model.rideExitConfirmation = null;
      finishRide({ returnToSetup: destination === "menu" });
    }

    function closePictureInPicture() {
      const pip = model.pipWindow;
      model.pipWindow = null;
      if (pip && !pip.closed) pip.close();
    }

    function resetToSetup() {
      cameraObserver.stop();
      closePictureInPicture();
      model.state = "setup"; model.rideStartedAt = 0; model.ridePausedAt = 0; model.accumulatedRidePauseMs = 0;
      model.ridePausedFromState = null; model.pausedActionRemainingMs = 0; model.rideExitConfirmation = null; model.summary = null; model.cameraEnabled = false;
      model.reviewReasonEditorDismissed = false;
      model.cameraAutoControl = false; model.cameraAutoEverEnabled = false; model.cameraControlHoldUntil = 0; model.pendingRideValues = null;
      model.cameraLearningPrompt = null; model.cameraLearningLastAsked = { aero: -Infinity, upright: -Infinity }; model.cameraLearningApplying = false;
      document.body.classList.remove("camera-preview");
      render();
      announce("Main menu ready.");
    }

    function handleScreenClick(event) {
      if (event.target.closest("button, input")) return;
      if (event.target.closest("[data-advance='true']")) advance("manual");
    }

    function unlockAudio() {
      try {
        audioContext ??= new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === "suspended") audioContext.resume();
      } catch (_) {}
    }

    function beep() {
      if (!audioContext) return;
      const start = audioContext.currentTime;
      [0, .22, .44].forEach(offset => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.type = "square"; oscillator.frequency.value = 1046;
        gain.gain.setValueAtTime(.0001, start + offset);
        gain.gain.exponentialRampToValueAtTime(.72, start + offset + .012);
        gain.gain.exponentialRampToValueAtTime(.0001, start + offset + .17);
        oscillator.connect(gain).connect(audioContext.destination);
        oscillator.start(start + offset); oscillator.stop(start + offset + .18);
      });
    }

    function updateLiveText(doc) {
      const elapsedSec = rideMs() / 1000;
      const progressText = doc.getElementById("ride-progress-text");
      if (progressText) progressText.textContent = `RIDE ${formatTime(elapsedSec)} / ${formatTime(model.plannedRideSec)}`;
      const fill = doc.querySelector(".ride-progress-fill");
      if (fill) fill.style.width = `${Math.min(100, elapsedSec / model.plannedRideSec * 100)}%`;
      const progress = doc.querySelector(".ride-progress");
      if (progress) {
        progress.setAttribute("aria-valuenow", String(Math.round(Math.min(100, elapsedSec / model.plannedRideSec * 100))));
        progress.setAttribute("aria-valuetext", `${formatTime(elapsedSec)} of ${formatTime(model.plannedRideSec)}`);
      }
      if (["aero", "paused"].includes(model.state)) {
        const timer = doc.getElementById("aero-timer");
        const challenge = currentChallenge();
        if (timer && !model.intervalComplete && !model.rideTargetReached) timer.textContent = formatHeroTime(challenge.remainingSec);
        const positionTimes = getPositionTimes(rideMs(), totalAeroMs());
        const overall = doc.getElementById("overall-time");
        if (overall) overall.textContent = formatTime(positionTimes.overallMs / 1000);
        const total = doc.getElementById("total-aero");
        if (total) total.textContent = formatTime(positionTimes.aeroMs / 1000);
        const upright = doc.getElementById("upright-time");
        if (upright) upright.textContent = formatTime(positionTimes.uprightMs / 1000);
        const percentage = doc.getElementById("aero-percentage");
        if (percentage) percentage.textContent = `(${aeroAdherencePercent()}%)`;
        const personalBestSec = Math.max(model.personalBestSec, model.bestIntervalMs / 1000);
        const chaseTargetSec = personalBestSec || model.currentIntervalTargetSec;
        const challengeProgress = doc.getElementById("challenge-progress-fill");
        if (challengeProgress) challengeProgress.style.width = `${Math.min(100, currentIntervalMs() / 10 / Math.max(1, chaseTargetSec))}%`;
        const challengeBest = doc.getElementById("challenge-best");
        if (challengeBest) challengeBest.innerHTML = personalBestMarkup();
        getReminderRows().forEach(item => {
          const node = doc.querySelector(`[data-reminder="${item.type}"]`);
          if (node) { node.textContent = item.remaining <= 0 ? "00:00" : formatTime(item.remaining); node.classList.toggle("due", item.remaining <= 0); }
          const ring = doc.querySelector(`[data-reminder-ring="${item.type}"]`);
          if (ring) ring.style.setProperty("--ring-progress", `${Math.max(0, Math.min(360, Math.max(0, item.remaining) / reminderCadence(item.type) * 360))}deg`);
        });
        const urgent = getDueActions()[0];
        if (urgent) {
          const overdue = doc.querySelector(`[data-resolution-overdue="${urgent.id}"]`);
          if (overdue) overdue.textContent = `${formatTime(Math.max(0, elapsedSec - urgent.dueAtSec))} late`;
        }
      } else if (model.state === "action" && model.currentAction === "fuel" && !model.actionFinished) {
        const timer = doc.getElementById("action-timer"); if (timer) timer.textContent = formatTime(Math.ceil((model.actionEndsAt - now()) / 1000));
      }
      for (const type of ACTION_TYPES) {
        const buttons = doc.querySelectorAll(`[data-action-type="${type}"]`);
        const locked = now() < model.actionLocks[type];
        buttons.forEach(button => {
          const defaultLabel = button.hasAttribute("data-default-label")
            ? button.dataset.defaultLabel
            : ({ water: "DRANK", fuel: "FUEL TAKEN", stretch: "STRETCH DONE" })[type];
          button.disabled = locked;
          button.classList.toggle("locked", locked);
          const label = button.querySelector(".card-action") || button;
          label.textContent = locked ? defaultLabel === "DONE" ? "✓ DONE" : "✓ LOGGED" : defaultLabel;
        });
      }
      if (model.actionFeedback && now() >= model.actionFeedback.expiresAt) {
        model.actionFeedback = null;
        doc.querySelector(".action-toast")?.remove();
      }
      if (model.cameraLearningPrompt && now() >= model.cameraLearningPrompt.expiresAt) {
        model.cameraLearningPrompt = null;
        doc.getElementById("camera-learning-prompt")?.remove();
      }
    }

    function updateTrainerUi(doc) {
      if (!doc || !model.trainerRideEnabled) return;
      const data = model.trainerSnapshot;
      const watts = doc.getElementById("trainer-watts");
      if (watts) watts.textContent = Number.isFinite(data.watts) ? `${Math.round(data.watts)} W` : "-- W";
      const cadence = doc.getElementById("trainer-cadence");
      if (cadence) cadence.textContent = Number.isFinite(data.cadence) ? `${Math.round(data.cadence)} RPM` : "-- RPM";
      const stops = doc.getElementById("trainer-stops");
      if (stops) stops.textContent = String(data.stopCount || 0);
      const stopped = doc.getElementById("trainer-stopped-time");
      if (stopped) stopped.textContent = formatTime((data.stoppedMs || 0) / 1000);
      doc.getElementById("trainer-metrics")?.classList.toggle("is-stopped", Boolean(data.isStopped));
    }

    function tick() {
      if (["aero", "paused", "action"].includes(model.state)) {
        if (model.trainerRideEnabled && trainer.connected) {
          model.trainerSnapshot = pedallingTracker.tick(now());
          updateTrainerUi(activeDocument());
        }
        const nextPhase = phaseContext();
        if (nextPhase.index !== model.currentPhaseIndex) {
          model.currentPhaseIndex = nextPhase.index;
          model.events.push({ type: "ride-phase-start", phase: nextPhase.number, name: nextPhase.name, at: rideMs() / 1000 });
          announce(`Phase ${nextPhase.number}, ${nextPhase.name}.`);
          render();
        }
        const createdReminders = materializeDueReminders();
        if (createdReminders.length) {
          beep();
          announce(`${ACTION_LABELS[createdReminders[0].type]} reminder due${createdReminders.length > 1 ? `, with ${createdReminders.length - 1} more queued` : ""}.`);
          render();
        }
        if (model.cameraEnabled) cameraObserver.setSessionContext({
          rideSec: rideMs() / 1000,
          manualAero: model.state === "aero" && model.aeroSegmentStartedAt > 0 && !model.intervalComplete && !model.rideTargetReached
        });
        const doc = activeDocument();
        updateLiveText(doc);
        if (!model.rideTargetReached && rideMs() >= model.plannedRideSec * 1000) {
          if (model.state === "aero") pauseAero();
          model.rideTargetReached = true; beep(); render();
        } else if (model.state === "aero" && !model.intervalComplete && intervalRemainingSec() <= 0) {
          completeInterval();
        } else if (model.state === "action" && model.currentAction === "fuel" && !model.actionFinished && now() >= model.actionEndsAt) {
          model.actionFinished = true; beep(); render();
        }
      }
      requestAnimationFrame(tick);
    }

    async function openPictureInPicture(sourceDoc) {
      const note = sourceDoc.getElementById("pip-note");
      if (!("documentPictureInPicture" in window)) return;
      try {
        if (model.pipWindow && !model.pipWindow.closed) { model.pipWindow.focus(); return; }
        const pip = await window.documentPictureInPicture.requestWindow({ width: 300, height: 400 });
        model.pipWindow = pip; pip.document.title = "Triathlon HUD";
        document.querySelectorAll("style").forEach(style => pip.document.head.append(style.cloneNode(true)));
        pip.document.body.innerHTML = '<main id="app"></main><div id="hud-status" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></div>';
        pip.document.addEventListener("click", handleScreenClick);
        pip.addEventListener("pagehide", () => { model.pipWindow = null; render(); }, { once: true });
        render();
      } catch (_) { if (note) note.textContent = "Pop Out was blocked. Try again."; }
    }

    window.render_game_to_text = () => JSON.stringify({
      coordinateSystem: "DOM interface; no world coordinates",
      state: model.state,
      ride: {
        elapsedSeconds: Math.round(rideMs() / 100) / 10,
        plannedSeconds: model.plannedRideSec,
        fullyPaused: model.state === "ride-paused",
        pausedFromState: model.state === "ride-paused" ? model.ridePausedFromState : null
      },
      aero: {
        elapsedSeconds: Math.round(totalAeroMs() / 100) / 10,
        intervalRemainingSeconds: Math.round(intervalRemainingSec() * 10) / 10,
        aeroClockPaused: model.state !== "aero" || model.intervalComplete || model.rideTargetReached
      },
      cameraLearningPrompt: model.cameraLearningPrompt && now() < model.cameraLearningPrompt.expiresAt
        ? { detectedState: model.cameraLearningPrompt.detectedState, answers: ["Yes", "No"] }
        : null,
      action: model.state === "action" || model.ridePausedFromState === "action" ? {
        type: model.currentAction,
        finished: model.actionFinished,
        countdownRemainingSeconds: model.currentAction === "fuel" && !model.actionFinished
          ? Math.round((model.state === "ride-paused" ? model.pausedActionRemainingMs : Math.max(0, model.actionEndsAt - now())) / 100) / 10
          : null
      } : null,
      availableControls: model.state === "ride-paused"
        ? ["Resume Ride", "End & Review", "Back to Main Menu"]
        : ["aero", "paused", "action"].includes(model.state)
          ? ["Pause", "Water", "Fuel", "Stretch"]
          : []
    });

    document.addEventListener("click", handleScreenClick);
    render();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
